<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronos — Historical Knowledge Map</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0e0e12;--surface:#16161e;--surface2:#1e1e2a;--border:#2a2a3a;--accent:#c9a96e;--text:#e8e4d9;--muted:#9a9ab0;--dim:#7a8aaa; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
  .logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent);letter-spacing:.05em}
  .logo span{font-style:italic;color:var(--muted);font-size:14px;margin-left:8px}
  .header-stats{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);display:flex;gap:20px}
  .stat-val{color:var(--accent)}
  .layout{display:flex;flex:1;overflow:hidden}
  .sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
  .sb-plain{padding:12px 14px;border-bottom:1px solid var(--border)}
  .sb-plain h3{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
  .filter-label{font-size:11px;color:var(--muted);margin-bottom:3px;font-family:'JetBrains Mono',monospace}
  select,input[type=text],input[type=number]{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;font-size:13px;font-family:'Crimson Pro',serif;border-radius:3px;outline:none}
  select:focus,input:focus{border-color:var(--accent)}
  .range-row{display:flex;gap:6px;margin-top:4px}
  .range-row input{width:50%}
  /* ── TREE EXPLORER ── */
  .ts-section{border-bottom:1px solid var(--border)}
  .ts-head{display:flex;align-items:center;gap:7px;padding:9px 12px;cursor:pointer;user-select:none;background:var(--surface);transition:background .12s}
  .ts-head:hover{background:var(--surface2)}
  .ts-toggle{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);width:12px;flex-shrink:0}
  .ts-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;flex:1}
  .ts-active-badge{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--accent);color:#0e0e12;border-radius:10px;padding:1px 7px}
  .ts-body{display:none;padding-bottom:4px}
  .ts-body.open{display:block}
  /* tree nodes */
  .tn-row{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 10px;cursor:pointer;transition:background .1s;min-height:26px;user-select:none}
  .tn-row:hover{background:var(--surface2)}
  .tn-row.tn-sel{background:rgba(201,169,110,.08)}
  .tn-row.tn-zero{opacity:.35}
  .tn-toggle{font-family:'JetBrains Mono',monospace;font-size:12px;width:14px;flex-shrink:0;text-align:center;cursor:pointer;color:var(--dim);transition:color .12s}
  .tn-toggle:hover{color:var(--accent)}
  .tn-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1.5px solid;transition:background .15s}
  .tn-lbl{font-family:'Crimson Pro',serif;font-size:13px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tn-row.tn-sel .tn-lbl{color:var(--accent);font-weight:600}
  .tn-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);flex-shrink:0;min-width:18px;text-align:right}
  .tn-count-zero{color:var(--border)}
  /* reset */
  .role-dd-item{display:flex;align-items:center;gap:8px;padding:5px 14px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);transition:background .1s;white-space:nowrap}
  .role-dd-item:hover{background:var(--surface2);color:var(--text)}
  .role-dd-item.checked{color:var(--accent)}
  .role-dd-check{width:12px;height:12px;border-radius:2px;border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px}
  .role-dd-item.checked .role-dd-check{background:var(--accent);border-color:var(--accent);color:#0e0e12}
  .toolbar-chip{font-size:10px;padding:1px 7px;border-radius:10px;border:1px solid var(--accent);color:var(--accent);display:flex;align-items:center;gap:3px;cursor:pointer;font-family:'JetBrains Mono',monospace}
  .toolbar-chip:hover{background:rgba(201,169,110,.15)}
  .btn-reset{width:100%;padding:6px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;border-radius:3px;transition:all .15s}
  .btn-reset:hover{border-color:var(--accent);color:var(--accent)}
  /* main */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .timeline-header{padding:10px 20px 0;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
  .view-tabs{display:flex}
  .tab{padding:6px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  /* active filter bar */
  .af-bar{padding:5px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:none;flex-wrap:wrap;gap:4px;align-items:center}
  .af-bar.vis{display:flex}
  .af-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);text-transform:uppercase;margin-right:4px}
  .af-tag{font-size:11px;padding:1px 8px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;gap:4px}
  .af-x{cursor:pointer;color:var(--dim);font-size:13px;line-height:1}
  .af-x:hover{color:var(--accent)}
  /* timeline */
  .timeline-area{flex:1;overflow:auto;padding:0;}
  .axis-row{display:flex;align-items:center;padding:0 20px 8px 200px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border);margin-bottom:8px}
  .axis-inner{flex:1;position:relative;height:20px}
  .axis-left-spacer{width:200px;flex-shrink:0;position:sticky;left:0;z-index:2;background:var(--bg)}
  .axis-right-spacer{width:80px;flex-shrink:0;position:sticky;right:0;z-index:2;background:var(--bg)}
  .axis-tick{position:absolute;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);transform:translateX(-50%);white-space:nowrap}
  .axis-line{position:absolute;top:18px;left:0;right:0;height:1px;background:var(--border)}
  .group-header{padding:6px 20px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:4px 0;position:sticky;left:0;right:0;z-index:3}
  .person-row{display:flex;align-items:center;padding:4px 20px;min-height:36px;transition:background .1s;cursor:pointer;padding-left:0;padding-right:0}
  .person-row:hover{background:var(--surface2)}
  .person-row.selected{background:rgba(201,169,110,.07)}
  .person-name-col{width:200px;flex-shrink:0;padding:0 12px 0 20px;position:sticky;left:0;z-index:2;background:inherit}
  .person-name{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Playfair Display',serif}
  .person-dates{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:1px}
  .bar-area{flex:1;position:relative;height:28px}
  .person-bar{position:absolute;top:50%;transform:translateY(-50%);height:14px;border-radius:3px;opacity:.85;transition:opacity .15s,height .15s}
  .person-bar:hover{opacity:1;height:18px}
  .person-row.selected .person-bar{opacity:1;height:18px;outline:1px solid rgba(255,255,255,.3)}
  .epoch-band{position:absolute;top:0;bottom:0;opacity:.06;pointer-events:none}
  .region-tag{flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:9px;padding:1px 7px;border-radius:10px;border:1px solid;opacity:.7;white-space:nowrap;margin-left:8px;align-self:center;position:sticky;right:0;z-index:2;background:inherit;margin-right:12px}
  /* zoom bar */
  .zoom-bar{display:flex;align-items:center;gap:6px;padding:0 16px}
  .zoom-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:14px;width:24px;height:24px;border-radius:3px;line-height:1;transition:all .12s;padding:0}
  .zoom-btn:hover{border-color:var(--accent);color:var(--accent)}
  .zoom-track{width:80px;height:4px;background:var(--border);border-radius:2px;position:relative;cursor:pointer}
  .zoom-thumb{position:absolute;top:-4px;width:12px;height:12px;border-radius:50%;background:var(--accent);transform:translateX(-50%);transition:left .1s;cursor:grab}
  .zoom-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);min-width:28px}
  /* timeline inner wrapper for zoom */
  .timeline-inner{position:relative;min-width:100%;transform-origin:left top}
  .axis-row-inner{display:flex;align-items:center;padding-bottom:8px;padding-left:200px}
  /* detail */
  .detail-panel{width:280px;background:var(--surface);border-left:1px solid var(--border);padding:16px;flex-shrink:0;overflow-y:auto;display:none}
  .detail-panel.open{display:block}
  .detail-name{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent);margin-bottom:2px}
  .detail-dates{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:12px}
  .detail-section{margin-bottom:12px}
  .detail-section h4{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px}
  .detail-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
  .detail-chip{padding:2px 8px;border-radius:20px;font-size:12px;border:1px solid var(--border);color:var(--muted)}
  .detail-bio{font-size:13px;color:var(--muted);line-height:1.6}
  .detail-rel{font-size:13px;color:var(--text);padding:3px 0;border-bottom:1px solid var(--border)}
  .detail-rel span{color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;margin-left:6px}
  .close-detail{float:right;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1}
  .close-detail:hover{color:var(--text)}
  /* hover popover */
  .popover{
    position:fixed;z-index:1000;width:280px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:5px;padding:14px;pointer-events:none;
    box-shadow:0 8px 32px rgba(0,0,0,.6);
    opacity:0;transition:opacity .15s;
  }
  .popover.show{opacity:1}
  .pop-name{font-family:'Playfair Display',serif;font-size:17px;color:var(--accent);margin-bottom:2px}
  .pop-dates{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:10px}
  .pop-section{margin-bottom:8px}
  .pop-section h4{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
  .pop-chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px}
  .pop-chip{padding:1px 7px;border-radius:20px;font-size:11px;border:1px solid var(--border);color:var(--muted)}
  .pop-rel{font-size:12px;color:var(--text);padding:2px 0;border-bottom:1px solid var(--border)}
  .pop-rel span{color:var(--muted);font-size:10px;font-family:'JetBrains Mono',monospace;margin-left:5px}
  .pop-bio{font-size:12px;color:var(--muted);line-height:1.5;margin-top:4px}
</style>
</head>
<body>
<header>
  <div class="logo">Tessera <span>temporum</span></div>
  <div class="header-stats">
    <div>persons <span class="stat-val" id="stat-persons">0</span></div>
    <div>visible <span class="stat-val" id="stat-visible">0</span></div>
    <div>span <span class="stat-val" id="stat-span">—</span></div>
  </div>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="sb-plain"><h3>Search</h3><input type="text" id="search-name" placeholder="Name…"></div>
    <div class="sb-plain">
      <h3>Time Range</h3>
      <div class="filter-label">From — To (negative = BC)</div>
      <div class="range-row"><input type="number" id="year-from" placeholder="-600"><input type="number" id="year-to" placeholder="2000"></div>
    </div>
    <div id="tree-root" style="flex:1;overflow-y:auto"></div>
    <div class="sb-plain">
      <h3>Group by</h3>
      <select id="group-by"><option value="field">Field</option><option value="region">Region</option><option value="epoch">Epoch</option><option value="dynasty">Dynasty</option><option value="dynasty">Dynasty</option><option value="none">None</option></select>
    </div>
    <div class="sb-plain"><button class="btn-reset" id="btn-reset">↺  Reset all filters</button></div>
  </div>
  <div class="main">
    <div class="timeline-header">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;flex:1;gap:0">
          <div class="view-tabs">
            <div class="tab active" id="tab-timeline" onclick="switchTab('timeline')">Timeline</div>
            <div class="tab" id="tab-network" onclick="switchTab('network')">Network</div>
            <div class="tab" id="tab-table" onclick="switchTab('table')">Table</div>
          </div>
          <div style="display:flex;align-items:center;gap:4px;margin-left:12px;border-left:1px solid var(--border);padding-left:12px">
            <div class="tab" id="tab-view-toggle" onclick="toggleViewMode()" title="Toggle lifetime vs office bars">Office View</div>
            <div class="tab" id="tab-sort-toggle" onclick="toggleSortMode()" title="Sort by birth year or office start">Sort: Birth</div>
            <div style="position:relative">
              <div class="tab" id="tab-role-btn" onclick="toggleRoleDropdown(event)" style="display:flex;align-items:center;gap:5px">Role <span id="role-arrow" style="font-size:9px;color:var(--dim)">▾</span></div>
              <div id="role-dropdown" style="display:none;position:absolute;top:100%;left:0;background:var(--surface);border:1px solid var(--border);border-radius:4px;min-width:200px;z-index:200;padding:6px 0;box-shadow:0 8px 24px rgba(0,0,0,.6)"></div>
            </div>
            <div id="toolbar-role-chips" style="display:flex;gap:4px;align-items:center;flex-wrap:wrap"></div>
          </div>
        </div>
        <div class="zoom-bar">
          <button class="zoom-btn" id="zoom-out" title="Zoom out">−</button>
          <div class="zoom-track" id="zoom-track">
            <div class="zoom-thumb" id="zoom-thumb"></div>
          </div>
          <button class="zoom-btn" id="zoom-in" title="Zoom in">+</button>
          <button class="zoom-btn" id="zoom-fit" title="Fit all" style="margin-left:6px;font-size:10px;padding:0 7px">FIT</button>
          <span class="zoom-label" id="zoom-label"></span>
        </div>
      </div>
    </div>
    <div class="af-bar" id="af-bar"></div>
    <div class="timeline-area" id="timeline-area"></div>
    <div class="timeline-area" id="network-area" style="display:none;position:relative;overflow:hidden;"></div>
    <div class="timeline-area" id="table-area" style="display:none;overflow:auto;padding:16px;"></div>
  </div>
  <div id="popover" class="popover"></div>
  <div class="detail-panel" id="detail-panel">
    <button class="close-detail" id="close-detail">×</button>
    <div class="detail-name" id="d-name"></div>
    <div class="detail-dates" id="d-dates"></div>
    <div class="detail-section"><h4>Fields</h4><div class="detail-chips" id="d-fields"></div><div class="detail-chips" id="d-schools"></div></div>
    <div class="detail-section"><h4>Region</h4><div class="detail-chips" id="d-regions"></div></div>
    <div class="detail-section"><h4>Organizations / Roles</h4><div id="d-orgs"></div></div>
    <div class="detail-section"><h4>Contemporaries</h4><div id="d-contemps"></div></div>
    <div class="detail-section"><h4>Bio</h4><div class="detail-bio" id="d-bio"></div></div>
    <div id="d-wiki" style="margin-top:10px;padding:0 0 4px 0;border-top:1px solid var(--border);padding-top:10px"></div>
  </div>
</div>
<script>
const TX = {
  Philosophy:{color:"#7eb8c9",subs:["Platonism","Aristotelianism","Stoicism","Epicureanism","Cynicism","Neoplatonism","Scholasticism","Rationalism","Empiricism","Idealism","Utilitarianism","Existentialism","Nihilism","Marxism","Pragmatism"]},
  Science:   {color:"#a8c97e",subs:["Astronomy","Physics","Mathematics","Biology","Chemistry","Medicine","Natural History","Mechanics","Optics","Geology","Psychology"]},
  Politics:  {color:"#c97e9a",subs:["Republic","Empire","Democracy","Monarchy","Diplomacy","Revolutionary","Colonial","Nationalism","Federalism"]},
  Military:  {color:"#c97e7e",subs:["General","Strategist","Naval","Cavalry","Siege","Guerrilla"]},
  Painting:  {color:"#c9a96e",subs:[
    "Renaissance Art","Baroque","Dutch Golden Age","Flemish","Chiaroscuro","Classicism",
    "Romanticism","Impressionism","Post-Impressionism","Cubism","Surrealism","Abstract",
    "Symbolism","Realism","Modernism","Sculpture","Classical Sculpture"
  ]},
  Architecture:{color:"#7ec9b8",subs:[
    "Ancient Architecture","Byzantine Architecture","Romanesque","Gothic","Renaissance Architecture",
    "Baroque Architecture","Neoclassical","Modernism","Bauhaus","International Style",
    "Organic Architecture","Deconstructivism","Catalan Modernisme","Parametric Design"
  ]},
  Literature:{color:"#c97e9a",subs:[
    "Ancient Epic","Medieval Literature","Drama","Renaissance Literature","Realism",
    "Romanticism","Modernism","Magical Realism","Poetry","Sufism"
  ]},
  Music:     {color:"#9e7ec9",subs:[
    "Baroque","Classical Music","Romantic Music","Late Romantic","Impressionist Music",
    "20th Century Modern","Neo-Classicism","Opera","Symphony","Piano","Ballet",
    "Counterpoint","Violin","Music Theory"
  ]},
  Religion:  {color:"#9e7ec9",subs:["Christianity","Catholicism","Protestantism","Islam","Buddhism","Confucianism","Judaism","Paganism","Mysticism","Theology"]},
};

const PERSONS=[
  {id:1, name:"Socrates",            birth:-470,death:-399,region:"Greece",     fields:["Philosophy"],           schools:["Platonism"],subregions:["Athens"],                                    orgs:[{name:"Athens",role:"Citizen"}],                                                                       bio:"Athenian philosopher credited as the founder of Western philosophy. Executed for impiety and corrupting youth."},
  {id:2, name:"Plato",               birth:-428,death:-348,region:"Greece",     fields:["Philosophy"],           schools:["Platonism","Idealism"],subregions:["Athens"],                          orgs:[{name:"Academy of Athens",role:"Founder"}],                                                             bio:"Student of Socrates, teacher of Aristotle. Founded the Academy, the first institution of higher learning in the Western world."},
  {id:3, name:"Aristotle",           birth:-384,death:-322,region:"Greece",     fields:["Philosophy","Science"], schools:["Aristotelianism","Natural History","Biology"],subregions:["Macedonia","Athens"],   orgs:[{name:"Macedonian Court",role:"Royal Tutor"},{name:"Lyceum",role:"Founder"}],                         bio:"Polymath whose writings covered physics, biology, ethics, politics, and poetry. Tutored Alexander the Great."},
  {id:4, name:"Confucius",           birth:-551,death:-479,region:"China",      fields:["Philosophy","Politics"],schools:["Confucianism","Diplomacy"],subregions:["Zhou"],                      orgs:[{name:"Lu (state)",role:"Government Minister"}],                                                        bio:"Chinese philosopher whose teachings on ethics and social relationships profoundly influenced East Asian culture."},
  {id:5, name:"Sun Tzu",             birth:-544,death:-496,region:"China",      fields:["Military","Philosophy"],schools:["Strategist"],subregions:["Zhou"],                                   orgs:[{name:"Wu (state)",role:"General"}],                                                                    bio:"Military strategist and author of The Art of War."},
  {id:6, name:"Alexander the Great", birth:-356,death:-323,region:"Greece",     fields:["Military","Politics"],  schools:["General","Empire"],subregions:["Macedonia"],                              orgs:[{name:"Macedonian Empire",role:"King & Commander"}],                                                    bio:"King of Macedon who created one of the largest empires in ancient history."},
  {id:7, name:"Epicurus",            birth:-341,death:-270,region:"Greece",     fields:["Philosophy"],           schools:["Epicureanism"],                                  orgs:[{name:"The Garden",role:"Founder"}],                                                                    bio:"Founder of Epicureanism. Taught that pleasure (ataraxia) is the highest good, achieved through modest living."},
  {id:8, name:"Zeno of Citium",      birth:-334,death:-262,region:"Greece",     fields:["Philosophy"],           schools:["Stoicism"],subregions:["Athens"],                                      orgs:[{name:"Stoa Poikile",role:"Founder"}],                                                                  bio:"Founder of the Stoic school of philosophy in Athens. Taught that virtue is sufficient for happiness."},
  {id:9, name:"Julius Caesar",       birth:-100,death:-44, region:"Rome",       fields:["Military","Politics"],  schools:["General","Republic","Empire"],subregions:["Roman Republic"],                   orgs:[{name:"Roman Republic",role:"Dictator"},{name:"Roman Army",role:"General"}],                           bio:"Roman statesman and general whose assassination sparked civil wars leading to the Roman Empire."},

  {id:82,name:"Edward VII",birth:1841,death:1910,region:"England",fields:["Politics", "Painting"],schools:["Monarchy", "Diplomacy"],subregions:["Victorian"],dynasty:"House of Saxe-Coburg and Gotha",orgs:[{name:"United Kingdom",role:"King (1901–1910)"}],bio:"Victoria's son. Known as the 'Uncle of Europe' for his family connections across royal houses. Diplomatic skills eased European tensions."},
  {id:83,name:"George V",birth:1865,death:1936,region:"England",fields:["Politics", "Military"],schools:["Monarchy", "Naval"],subregions:["Victorian"],dynasty:"House of Windsor",orgs:[{name:"United Kingdom",role:"King (1910–1936)"}],bio:"Renamed the royal house to Windsor during WWI. First monarch to make Christmas radio broadcasts."},
  {id:84,name:"Edward VIII",birth:1894,death:1972,region:"England",fields:["Politics"],schools:["Monarchy"],subregions:["Victorian"],dynasty:"House of Windsor",orgs:[{name:"United Kingdom",role:"King (Jan–Dec 1936)"}],bio:"Abdicated to marry American divorcée Wallis Simpson. Shortest reign of any modern British monarch."},
  {id:85,name:"George VI",birth:1895,death:1952,region:"England",fields:["Politics", "Military"],schools:["Monarchy", "Naval"],subregions:["Victorian"],dynasty:"House of Windsor",orgs:[{name:"United Kingdom",role:"King (1936–1952)"}],bio:"Led Britain through WWII. Overcame a severe stammer. Father of Elizabeth II. Depicted in The King's Speech."},
  {id:86,name:"Elizabeth II",birth:1926,death:2022,region:"England",fields:["Politics"],schools:["Monarchy"],subregions:["Victorian"],dynasty:"House of Windsor",orgs:[{name:"United Kingdom",role:"Queen (1952–2022)"}],bio:"Longest-reigning British monarch and longest-reigning female monarch in history. Served 14 Prime Ministers."},
  {id:87,name:"Charles III",birth:1948,death:2026,region:"England",fields:["Politics", "Art"],schools:["Monarchy", "Architecture"],subregions:["Victorian"],dynasty:"House of Windsor",orgs:[{name:"United Kingdom",role:"King (2022–present)"}],bio:"Longest-serving heir apparent in British history. Environmental advocate. Became king at 73 following the death of Elizabeth II."},
  {id:101,name:"Ivan III (the Great)",birth:1440,death:1505,region:"Russia",fields:["Politics", "Military"],schools:["Monarchy", "Empire"],subregions:["Russia"],dynasty:"House of Rurik",roles:["Head of State"],orgs:[{name:"Grand Duchy of Moscow",role:"Grand Prince (1462–1505)"}],bio:"United Russian principalities under Moscow. Ended Mongol dominance. Called himself Tsar of All Russia."},
  {id:102,name:"Ivan IV (the Terrible)",birth:1530,death:1584,region:"Russia",fields:["Politics", "Military"],schools:["Monarchy", "Empire"],subregions:["Russia"],dynasty:"House of Rurik",roles:["Head of State"],orgs:[{name:"Tsardom of Russia",role:"Tsar (1547–1584)"}],bio:"First ruler to be officially crowned Tsar. Expanded Russia massively but ruled with extreme cruelty. Created the Oprichnina terror."},
  {id:103,name:"Peter I (the Great)",birth:1672,death:1725,region:"Russia",fields:["Politics", "Military"],schools:["Monarchy", "Empire"],subregions:["Russia"],dynasty:"House of Romanov",roles:["Head of State", "Military Commander"],orgs:[{name:"Russian Empire",role:"Emperor (1721–1725)"}],bio:"Transformed Russia into a major European power. Founded St. Petersburg. Defeated Sweden in the Great Northern War. Westernized Russian culture and administration."},
  {id:104,name:"Catherine I",birth:1684,death:1727,region:"Russia",fields:["Politics"],schools:["Monarchy"],subregions:["Russia"],dynasty:"House of Romanov",roles:["Head of State"],orgs:[{name:"Russian Empire",role:"Empress (1725–1727)"}],bio:"Wife of Peter the Great. First woman to rule Russia as Empress in her own right."},
  {id:105,name:"Elizabeth of Russia",birth:1709,death:1762,region:"Russia",fields:["Politics", "Art"],schools:["Monarchy"],subregions:["Russia"],dynasty:"House of Romanov",roles:["Head of State"],orgs:[{name:"Russian Empire",role:"Empress (1741–1762)"}],bio:"Daughter of Peter the Great. Patroness of arts and architecture. Founded Moscow University. Led Russia in the Seven Years' War."},
  {id:106,name:"Catherine II (the Great)",birth:1729,death:1796,region:"Russia",fields:["Politics", "Philosophy"],schools:["Monarchy", "Enlightenment", "Empiricism"],subregions:["Russia"],dynasty:"House of Romanov",roles:["Head of State"],orgs:[{name:"Russian Empire",role:"Empress (1762–1796)"}],bio:"Longest-ruling female leader of Russia. Enlightened despot who expanded the Empire greatly, reformed administration, and corresponded with Voltaire and Diderot."},
  {id:107,name:"Paul I",birth:1754,death:1801,region:"Russia",fields:["Politics", "Military"],schools:["Monarchy"],subregions:["Russia"],dynasty:"House of Romanov",roles:["Head of State"],orgs:[{name:"Russian Empire",role:"Emperor (1796–1801)"}],bio:"Son of Catherine the Great. Erratic ruler, reversed many of her reforms. Assassinated by conspirators."},
  {id:108,name:"Alexander I",birth:1777,death:1825,region:"Russia",fields:["Politics", "Military"],schools:["Monarchy", "Diplomacy"],subregions:["Russia"],dynasty:"House of Romanov",roles:["Head of State", "Military Commander"],orgs:[{name:"Russian Empire",role:"Emperor (1801–1825)"}],bio:"Defeated Napoleon. Key figure at the Congress of Vienna. Founded the Holy Alliance. Later grew mystical and conservative."},
  {id:109,name:"Nicholas I",birth:1796,death:1855,region:"Russia",fields:["Politics", "Military"],schools:["Monarchy"],subregions:["Russia"],dynasty:"House of Romanov",roles:["Head of State"],orgs:[{name:"Russian Empire",role:"Emperor (1825–1855)"}],bio:"Repressed the Decembrist Revolt. Expanded Russia into Central Asia. Died during the disastrous Crimean War."},
  {id:110,name:"Alexander II",birth:1818,death:1881,region:"Russia",fields:["Politics"],schools:["Monarchy", "Republic"],subregions:["Russia"],dynasty:"House of Romanov",roles:["Head of State"],orgs:[{name:"Russian Empire",role:"Emperor (1855–1881)"}],bio:"The Tsar Liberator. Emancipated the serfs in 1861. Assassinated by revolutionary terrorists."},
  {id:111,name:"Alexander III",birth:1845,death:1894,region:"Russia",fields:["Politics", "Military"],schools:["Monarchy"],subregions:["Russia"],dynasty:"House of Romanov",roles:["Head of State"],orgs:[{name:"Russian Empire",role:"Emperor (1881–1894)"}],bio:"Reversed his father's liberal reforms. Promoted Russian nationalism and Orthodoxy. Industrialized Russia rapidly."},
  {id:112,name:"Nicholas II",birth:1868,death:1918,region:"Russia",fields:["Politics"],schools:["Monarchy"],subregions:["Russia"],dynasty:"House of Romanov",roles:["Head of State"],orgs:[{name:"Russian Empire",role:"Emperor (1894–1917)"}],bio:"Last Tsar of Russia. Lost the Russo-Japanese War. Failed to manage WWI. Abdicated in 1917 and was executed with his family by the Bolsheviks."},
  {id:113,name:"Vladimir Lenin",birth:1870,death:1924,region:"Russia",fields:["Politics", "Philosophy"],schools:["Marxism", "Revolutionary"],subregions:["Russia"],dynasty:"",roles:["Head of State", "Revolutionary"],orgs:[{name:"Soviet Union",role:"Chairman of Council (1917–1924)"},{name:"Bolshevik Party",role:"Leader"}],bio:"Leader of the Bolshevik Revolution. Founded the Soviet Union. Developed Marxism-Leninism. Died before consolidating full control."},
  {id:114,name:"Joseph Stalin",birth:1878,death:1953,region:"Russia",fields:["Politics", "Military"],schools:["Marxism", "Revolutionary"],subregions:["Russia"],dynasty:"",roles:["Head of State", "Military Commander"],orgs:[{name:"Soviet Union",role:"General Secretary (1922–1952)"},{name:"Soviet Union",role:"Premier (1941–1953)"}],bio:"Transformed the USSR into an industrial superpower through forced collectivization and five-year plans. Led the Soviet war effort in WWII. His purges killed millions."},
  {id:115,name:"Georgy Malenkov",birth:1902,death:1988,region:"Russia",fields:["Politics"],schools:["Marxism"],subregions:["Russia"],dynasty:"",roles:["Head of State"],orgs:[{name:"Soviet Union",role:"Premier (1953–1955)"}],bio:"Briefly succeeded Stalin as Premier. Ousted by Khrushchev. Advocated consumer goods over heavy industry."},
  {id:116,name:"Nikita Khrushchev",birth:1894,death:1971,region:"Russia",fields:["Politics"],schools:["Marxism"],subregions:["Russia"],dynasty:"",roles:["Head of State"],orgs:[{name:"Soviet Union",role:"First Secretary (1953–1964)"}],bio:"De-Stalinized the USSR. Cuban Missile Crisis. Space race (Sputnik). Ousted in a coup by Brezhnev."},
  {id:117,name:"Leonid Brezhnev",birth:1906,death:1982,region:"Russia",fields:["Politics", "Military"],schools:["Marxism"],subregions:["Russia"],dynasty:"",roles:["Head of State"],orgs:[{name:"Soviet Union",role:"General Secretary (1964–1982)"}],bio:"Longest-serving Soviet leader after Stalin. Era of stagnation. Invaded Czechoslovakia and Afghanistan. Détente with the West."},
  {id:118,name:"Yuri Andropov",birth:1914,death:1984,region:"Russia",fields:["Politics"],schools:["Marxism"],subregions:["Russia"],dynasty:"",roles:["Head of State"],orgs:[{name:"Soviet Union",role:"General Secretary (1982–1984)"},{name:"KGB",role:"Chairman (1967–1982)"}],bio:"Former KGB chief. Briefly led the USSR. Attempted reforms but died after only 15 months in office."},
  {id:119,name:"Konstantin Chernenko",birth:1911,death:1985,region:"Russia",fields:["Politics"],schools:["Marxism"],subregions:["Russia"],dynasty:"",roles:["Head of State"],orgs:[{name:"Soviet Union",role:"General Secretary (1984–1985)"}],bio:"Last of the old-guard Soviet leaders. Ruled for only 13 months before dying of emphysema. His death paved the way for Gorbachev."},
  {id:120,name:"Mikhail Gorbachev",birth:1931,death:2022,region:"Russia",fields:["Politics"],schools:["Marxism", "Republic"],subregions:["Russia"],dynasty:"",roles:["Head of State"],orgs:[{name:"Soviet Union",role:"General Secretary (1985–1991)"},{name:"Soviet Union",role:"President (1990–1991)"}],bio:"Last leader of the Soviet Union. Introduced glasnost and perestroika. The USSR dissolved under his watch. Nobel Peace Prize 1990."},
  {id:121,name:"Boris Yeltsin",birth:1931,death:2007,region:"Russia",fields:["Politics"],schools:["Republic", "Federalism"],subregions:["Russia"],dynasty:"",roles:["Head of State"],orgs:[{name:"Russian Federation",role:"President (1991–1999)"}],bio:"First President of the Russian Federation. Led Russia through chaotic post-Soviet transition. Launched two Chechen wars. Handed power to Putin on New Year's Eve 1999."},
  {id:122,name:"Vladimir Putin",birth:1952,death:2026,region:"Russia",fields:["Politics", "Military"],schools:["Nationalism", "Empire"],subregions:["Russia"],dynasty:"",roles:["Head of State"],terms:[{role:"President",org:"Russian Federation",start:2000,end:2008},{role:"Prime Minister",org:"Russian Federation",start:2008,end:2012},{role:"President",org:"Russian Federation",start:2012,end:2026}],orgs:[{name:"Russian Federation",role:"President (2000–2008, 2012–present)"},{name:"Russian Federation",role:"Prime Minister (2008–2012)"},{name:"KGB / FSB",role:"Officer / Director"}],bio:"Dominant figure in Russian politics since 2000. Centralized power, suppressed opposition, invaded Ukraine in 2022. Former KGB officer."},
  {id:123,name:"Dmitry Medvedev",birth:1965,death:2026,region:"Russia",fields:["Politics"],schools:["Republic"],subregions:["Russia"],dynasty:"",roles:["Head of State"],terms:[{role:"President",org:"Russian Federation",start:2008,end:2012},{role:"Prime Minister",org:"Russian Federation",start:2012,end:2020}],terms:[{role:"President",org:"Russian Federation",start:2008,end:2012},{role:"Prime Minister",org:"Russian Federation",start:2012,end:2020}],orgs:[{name:"Russian Federation",role:"President (2008–2012)"},{name:"Russian Federation",role:"Prime Minister (2012–2020)"}],bio:"President during Putin's constitutionally-required gap. Widely seen as a placeholder. Now Deputy Chair of Security Council."},
  {id:130,name:"Qin Shi Huang",birth:-259,death:-210,region:"China",fields:["Politics", "Military"],schools:["Empire", "General"],subregions:["Qin"],dynasty:"Qin Dynasty",roles:["Head of State", "Military Commander"],orgs:[{name:"Qin Empire",role:"First Emperor (221–210 BC)"}],bio:"First Emperor of a unified China. Built the Great Wall and Terracotta Army. Standardized weights, measures, and writing. Ruled with iron authoritarianism."},
  {id:131,name:"Liu Bang (Emperor Gaozu)",birth:-256,death:-195,region:"China",fields:["Politics", "Military"],schools:["Empire"],subregions:["Han"],dynasty:"Han Dynasty",roles:["Head of State", "Military Commander"],orgs:[{name:"Han Dynasty",role:"Emperor (202–195 BC)"}],bio:"Peasant who overthrew the Qin and founded the Han Dynasty. One of the few dynastic founders of humble origin."},
  {id:132,name:"Emperor Wu of Han",birth:-156,death:-87,region:"China",fields:["Politics", "Military"],schools:["Empire", "General"],subregions:["Han"],dynasty:"Han Dynasty",roles:["Head of State", "Military Commander"],orgs:[{name:"Han Dynasty",role:"Emperor (141–87 BC)"}],bio:"Greatest Han emperor. Expanded Chinese territory into Central Asia, Korea and Vietnam. Established Confucianism as state philosophy."},
  {id:133,name:"Cao Cao",birth:155,death:220,region:"China",fields:["Military", "Politics", "Art"],schools:["General", "Strategist", "Poetry"],subregions:["Han"],dynasty:"Han Dynasty",roles:["Military Commander"],orgs:[{name:"Han Dynasty",role:"Chancellor & Warlord"}],bio:"Brilliant military strategist, poet, and statesman who unified northern China. Though he held the real power, he never officially claimed the throne. Basis of Romance of the Three Kingdoms."},
  {id:134,name:"Emperor Taizong of Tang",birth:598,death:649,region:"China",fields:["Politics", "Military"],schools:["Empire", "General"],subregions:["Tang"],dynasty:"Tang Dynasty",roles:["Head of State", "Military Commander"],orgs:[{name:"Tang Dynasty",role:"Emperor (626–649)"}],bio:"Considered the greatest Tang emperor and one of China's best rulers. Expanded empire to greatest extent, promoted Silk Road trade, and fostered arts and scholarship."},
  {id:135,name:"Wu Zetian",birth:624,death:705,region:"China",fields:["Politics"],schools:["Empire", "Monarchy"],subregions:["Tang"],dynasty:"Tang Dynasty",roles:["Head of State"],orgs:[{name:"Zhou Dynasty (Tang interregnum)",role:"Emperor (690–705)"}],bio:"The only woman in Chinese history to assume the title of Empress Regnant. Ruled effectively for decades, expanded the empire and reformed the civil service."},
  {id:136,name:"Emperor Xuanzong of Tang",birth:685,death:762,region:"China",fields:["Politics", "Art"],schools:["Empire", "Music", "Poetry"],subregions:["Tang"],dynasty:"Tang Dynasty",roles:["Head of State"],orgs:[{name:"Tang Dynasty",role:"Emperor (712–756)"}],bio:"Presided over the golden age of Tang culture. His love affair with Yang Guifei and the An Lushan Rebellion marked the dynasty's decline."},
  {id:137,name:"Genghis Khan",birth:1162,death:1227,region:"China",fields:["Military", "Politics"],schools:["Empire", "General", "Strategist"],subregions:["Yuan (Mongol)"],dynasty:"Yuan Dynasty",roles:["Head of State", "Military Commander"],orgs:[{name:"Mongol Empire",role:"Great Khan (1206–1227)"}],bio:"Founded the largest contiguous land empire in history. United Mongol tribes. His conquests killed millions but also connected East and West via the Pax Mongolica."},
  {id:138,name:"Kublai Khan",birth:1215,death:1294,region:"China",fields:["Politics", "Military"],schools:["Empire"],subregions:["Yuan (Mongol)"],dynasty:"Yuan Dynasty",roles:["Head of State"],orgs:[{name:"Yuan Dynasty",role:"Emperor (1271–1294)"},{name:"Mongol Empire",role:"Great Khan"}],bio:"Grandson of Genghis Khan. Founded the Yuan Dynasty in China. Received Marco Polo. Failed invasions of Japan and Southeast Asia."},
  {id:139,name:"Zhu Yuanzhang (Hongwu Emperor)",birth:1328,death:1398,region:"China",fields:["Politics", "Military"],schools:["Empire"],subregions:["Ming"],dynasty:"Ming Dynasty",roles:["Head of State", "Military Commander"],orgs:[{name:"Ming Dynasty",role:"Emperor (1368–1398)"}],bio:"Peasant who overthrew the Mongol Yuan Dynasty and founded the Ming. Centralized power, purged officials ruthlessly, and rebuilt China's infrastructure."},
  {id:140,name:"Yongle Emperor",birth:1360,death:1424,region:"China",fields:["Politics", "Military"],schools:["Empire", "Naval"],subregions:["Ming"],dynasty:"Ming Dynasty",roles:["Head of State", "Military Commander"],orgs:[{name:"Ming Dynasty",role:"Emperor (1402–1424)"}],bio:"Moved capital to Beijing, built the Forbidden City, commissioned Zheng He's voyages, and compiled the Yongle Encyclopedia — the largest book ever written at the time."},
  {id:141,name:"Kangxi Emperor",birth:1654,death:1722,region:"China",fields:["Politics", "Science", "Philosophy"],schools:["Empire", "Mathematics", "Confucianism"],subregions:["Qing"],dynasty:"Qing Dynasty",roles:["Head of State"],orgs:[{name:"Qing Dynasty",role:"Emperor (1661–1722)"}],bio:"Longest-reigning emperor in Chinese history. Suppressed rebellions, expanded the empire, and fostered arts and science. Met with Jesuit missionaries."},
  {id:142,name:"Qianlong Emperor",birth:1711,death:1799,region:"China",fields:["Politics", "Art", "Philosophy"],schools:["Empire", "Poetry", "Confucianism"],subregions:["Qing"],dynasty:"Qing Dynasty",roles:["Head of State"],orgs:[{name:"Qing Dynasty",role:"Emperor (1735–1796)"}],bio:"Expanded the Qing Empire to its greatest extent. Prolific poet. Received Lord Macartney's British mission. His refusal to open trade contributed to China's later isolation."},
  {id:143,name:"Empress Dowager Cixi",birth:1835,death:1908,region:"China",fields:["Politics"],schools:["Monarchy", "Empire"],subregions:["Qing"],dynasty:"Qing Dynasty",roles:["Head of State"],orgs:[{name:"Qing Dynasty",role:"Empress Dowager / Regent (1861–1908)"}],bio:"De facto ruler of China for 47 years. Resisted modernization. Supported the Boxer Rebellion. Her conservative policies contributed to the dynasty's collapse."},
  {id:144,name:"Puyi",birth:1906,death:1967,region:"China",fields:["Politics"],schools:["Monarchy"],subregions:["Qing"],dynasty:"Qing Dynasty",roles:["Head of State"],orgs:[{name:"Qing Dynasty",role:"Emperor (1908–1912)"},{name:"Manchukuo",role:"Emperor (1934–1945)"}],bio:"Last Emperor of China. Abdicated aged 6. Later became a Japanese puppet emperor of Manchukuo. Ended his life as a gardener in Communist China. Subject of Bertolucci's film."},
  {id:150,name:"Sun Yat-sen",birth:1866,death:1925,region:"China",fields:["Politics", "Philosophy"],schools:["Republic", "Revolutionary", "Nationalism"],subregions:["Republic / PRC"],dynasty:"",roles:["Head of State", "Revolutionary"],orgs:[{name:"Republic of China",role:"Provisional President (1912)"},{name:"Kuomintang",role:"Founder & Leader"}],bio:"Father of the Nation. Led the revolution that overthrew the Qing Dynasty. Developed the Three Principles of the People. Revered by both CCP and Taiwan."},
  {id:151,name:"Chiang Kai-shek",birth:1887,death:1975,region:"China",fields:["Politics", "Military"],schools:["Nationalism", "Military Command"],subregions:["Republic / PRC"],dynasty:"",roles:["Head of State", "Military Commander"],orgs:[{name:"Republic of China",role:"Generalissimo & President"},{name:"Kuomintang",role:"Leader"}],bio:"Led Nationalist China against Japan and then lost the Civil War to the Communists. Retreated to Taiwan where he ruled until his death."},
  {id:152,name:"Mao Zedong",birth:1893,death:1976,region:"China",fields:["Politics", "Philosophy", "Art"],schools:["Marxism", "Revolutionary", "Nationalism", "Poetry"],subregions:["Republic / PRC"],dynasty:"",roles:["Head of State", "Military Commander", "Revolutionary"],orgs:[{name:"People's Republic of China",role:"Chairman (1949–1976)"},{name:"CCP",role:"General Secretary / Chairman"}],bio:"Founded the People's Republic of China. The Great Leap Forward and Cultural Revolution caused tens of millions of deaths. Transformed China but at enormous human cost."},
  {id:153,name:"Liu Shaoqi",birth:1898,death:1969,region:"China",fields:["Politics"],schools:["Marxism"],subregions:["Republic / PRC"],dynasty:"",roles:["Head of State"],orgs:[{name:"People's Republic of China",role:"President (1959–1968)"}],bio:"Mao's chosen successor and state president. Purged during the Cultural Revolution. Died in detention, denied medical care. Posthumously rehabilitated."},
  {id:154,name:"Deng Xiaoping",birth:1904,death:1997,region:"China",fields:["Politics", "Philosophy"],schools:["Marxism", "Pragmatism"],subregions:["Republic / PRC"],dynasty:"",roles:["Head of State"],orgs:[{name:"People's Republic of China",role:"Paramount Leader (1978–1989)"},{name:"CCP",role:"General Secretary"}],bio:"Architect of China's economic reforms. 'To get rich is glorious.' Opened China to foreign investment. Ordered the Tiananmen Square crackdown in 1989."},
  {id:155,name:"Hua Guofeng",birth:1921,death:2008,region:"China",fields:["Politics"],schools:["Marxism"],subregions:["Republic / PRC"],dynasty:"",roles:["Head of State"],orgs:[{name:"People's Republic of China",role:"Premier & CCP Chairman (1976–1980)"}],bio:"Mao's designated successor. Arrested the Gang of Four. Was gradually sidelined by Deng Xiaoping."},
  {id:156,name:"Hu Yaobang",birth:1915,death:1989,region:"China",fields:["Politics"],schools:["Marxism", "Republic"],subregions:["Republic / PRC"],dynasty:"",roles:["Head of State"],orgs:[{name:"CCP",role:"General Secretary (1982–1987)"}],bio:"Reform-minded CCP leader. Forced to resign by conservatives. His death in April 1989 triggered the Tiananmen Square protests."},
  {id:157,name:"Zhao Ziyang",birth:1919,death:2005,region:"China",fields:["Politics"],schools:["Marxism", "Republic"],subregions:["Republic / PRC"],dynasty:"",roles:["Head of State"],orgs:[{name:"CCP",role:"General Secretary (1987–1989)"},{name:"People's Republic of China",role:"Premier (1980–1987)"}],bio:"Sympathized with Tiananmen protesters. Placed under house arrest for 16 years until his death. His secret memoirs were smuggled out and published posthumously."},
  {id:158,name:"Jiang Zemin",birth:1926,death:2022,region:"China",fields:["Politics"],schools:["Marxism", "Nationalism"],subregions:["Republic / PRC"],dynasty:"",roles:["Head of State"],orgs:[{name:"People's Republic of China",role:"President (1993–2003)"},{name:"CCP",role:"General Secretary (1989–2002)"}],bio:"Rose to power after Tiananmen. Oversaw China's economic boom and accession to the WTO. Returned Hong Kong from Britain in 1997."},
  {id:159,name:"Hu Jintao",birth:1942,death:2026,region:"China",fields:["Politics"],schools:["Marxism"],subregions:["Republic / PRC"],dynasty:"",roles:["Head of State"],orgs:[{name:"People's Republic of China",role:"President (2003–2013)"},{name:"CCP",role:"General Secretary (2002–2012)"}],bio:"Presided over China's rise as a global economic superpower. Hosted the 2008 Beijing Olympics. Known for collective, consensus-based leadership."},
  {id:160,name:"Xi Jinping",birth:1953,death:2026,region:"China",fields:["Politics", "Military"],schools:["Marxism", "Nationalism", "Empire"],subregions:["Republic / PRC"],dynasty:"",roles:["Head of State", "Military Commander"],orgs:[{name:"People's Republic of China",role:"President (2013–present)"},{name:"CCP",role:"General Secretary (2012–present)"},{name:"Central Military Commission",role:"Chairman"}],bio:"Most powerful Chinese leader since Mao. Eliminated term limits. Belt and Road Initiative. Cracked down on Hong Kong and Xinjiang. Increasingly assertive foreign policy."},
  {id:201,name:"George Washington",birth:1732,death:1799,region:"USA",fields:["Politics", "Military"],schools:["Republic", "General", "No Party"],subregions:["Early Republic"],dynasty:"",party:"No Party",roles:["Head of State", "Military Commander"],terms:[{"role": "President", "org": "United States", "start": 1789, "end": 1797}],orgs:[{name:"United States",role:"President (1789–1797)"}],bio:"First President of the United States. Commander of the Continental Army. Refused a third term, setting a precedent."},
  {id:202,name:"John Adams",birth:1735,death:1826,region:"USA",fields:["Politics", "Philosophy"],schools:["Republic", "Federalism", "Federalist"],subregions:["Early Republic"],dynasty:"",party:"Federalist",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1797, "end": 1801}],orgs:[{name:"United States",role:"President (1797–1801)"}],bio:"Second President. Avoided war with France. Lost re-election to Jefferson. Father of John Quincy Adams."},
  {id:203,name:"Thomas Jefferson",birth:1743,death:1826,region:"USA",fields:["Politics", "Philosophy", "Science"],schools:["Republic", "Rationalism", "Empiricism", "Democratic-Republican"],subregions:["Early Republic"],dynasty:"",party:"Democratic-Republican",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1801, "end": 1809}],orgs:[{name:"United States",role:"President (1801–1809)"}],bio:"Author of the Declaration of Independence. Doubled US territory with the Louisiana Purchase. Renaissance man — architect, scientist, philosopher."},
  {id:204,name:"James Madison",birth:1751,death:1836,region:"USA",fields:["Politics", "Philosophy"],schools:["Republic", "Federalism", "Democratic-Republican"],subregions:["Early Republic"],dynasty:"",party:"Democratic-Republican",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1809, "end": 1817}],orgs:[{name:"United States",role:"President (1809–1817)"}],bio:"Father of the Constitution. Led the US through the War of 1812. The White House was burned during his presidency."},
  {id:205,name:"James Monroe",birth:1758,death:1831,region:"USA",fields:["Politics", "Military"],schools:["Republic", "Diplomacy", "Democratic-Republican"],subregions:["Early Republic"],dynasty:"",party:"Democratic-Republican",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1817, "end": 1825}],orgs:[{name:"United States",role:"President (1817–1825)"}],bio:"Era of Good Feelings. Monroe Doctrine warned Europe against colonization of the Americas."},
  {id:206,name:"John Quincy Adams",birth:1767,death:1848,region:"USA",fields:["Politics", "Diplomacy"],schools:["Republic", "Diplomacy", "Democratic-Republican"],subregions:["Early Republic"],dynasty:"",party:"Democratic-Republican",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1825, "end": 1829}],orgs:[{name:"United States",role:"President (1825–1829)"}],bio:"Son of John Adams. Only president to later serve in Congress. Strong opponent of slavery."},
  {id:207,name:"Andrew Jackson",birth:1767,death:1845,region:"USA",fields:["Politics", "Military"],schools:["Republic", "General", "Nationalism", "Democratic"],subregions:["Early Republic"],dynasty:"",party:"Democratic",roles:["Head of State", "Military Commander"],terms:[{"role": "President", "org": "United States", "start": 1829, "end": 1837}],orgs:[{name:"United States",role:"President (1829–1837)"}],bio:"Populist hero, Indian Removal Act. First Democratic president. Survived an assassination attempt."},
  {id:208,name:"Martin Van Buren",birth:1782,death:1862,region:"USA",fields:["Politics"],schools:["Republic", "Democratic"],subregions:["Early Republic"],dynasty:"",party:"Democratic",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1837, "end": 1841}],orgs:[{name:"United States",role:"President (1837–1841)"}],bio:"First president born a US citizen. Presidency dominated by the Panic of 1837 economic crisis."},
  {id:209,name:"William Henry Harrison",birth:1773,death:1841,region:"USA",fields:["Politics", "Military"],schools:["General", "Republic", "Whig"],subregions:["Early Republic"],dynasty:"",party:"Whig",roles:["Head of State", "Military Commander"],terms:[{"role": "President", "org": "United States", "start": 1841, "end": 1841}],orgs:[{name:"United States",role:"President (1841)"}],bio:"Died of pneumonia after 31 days in office — shortest presidency in US history."},
  {id:210,name:"John Tyler",birth:1790,death:1862,region:"USA",fields:["Politics"],schools:["Republic", "Whig"],subregions:["Antebellum"],dynasty:"",party:"Whig",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1841, "end": 1845}],orgs:[{name:"United States",role:"President (1841–1845)"}],bio:"First VP to assume presidency on death of predecessor. Expelled from the Whig party while in office."},
  {id:211,name:"James K. Polk",birth:1795,death:1849,region:"USA",fields:["Politics", "Military"],schools:["Republic", "Empire", "Democratic"],subregions:["Antebellum"],dynasty:"",party:"Democratic",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1845, "end": 1849}],orgs:[{name:"United States",role:"President (1845–1849)"}],bio:"Expanded US territory massively — annexed Texas, Oregon, California, Southwest. Kept all his campaign promises then declined a second term."},
  {id:212,name:"Zachary Taylor",birth:1784,death:1850,region:"USA",fields:["Politics", "Military"],schools:["General", "Republic", "Whig"],subregions:["Antebellum"],dynasty:"",party:"Whig",roles:["Head of State", "Military Commander"],terms:[{"role": "President", "org": "United States", "start": 1849, "end": 1850}],orgs:[{name:"United States",role:"President (1849–1850)"}],bio:"War hero of Mexican-American War. Died in office after 16 months, possibly from food poisoning."},
  {id:213,name:"Millard Fillmore",birth:1800,death:1874,region:"USA",fields:["Politics"],schools:["Republic", "Whig"],subregions:["Antebellum"],dynasty:"",party:"Whig",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1850, "end": 1853}],orgs:[{name:"United States",role:"President (1850–1853)"}],bio:"Signed the Compromise of 1850 including the Fugitive Slave Act. Last Whig president."},
  {id:214,name:"Franklin Pierce",birth:1804,death:1869,region:"USA",fields:["Politics", "Military"],schools:["Republic", "Democratic"],subregions:["Antebellum"],dynasty:"",party:"Democratic",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1853, "end": 1857}],orgs:[{name:"United States",role:"President (1853–1857)"}],bio:"Kansas-Nebraska Act inflamed slavery tensions. Generally ranked among worst presidents."},
  {id:215,name:"James Buchanan",birth:1791,death:1868,region:"USA",fields:["Politics", "Diplomacy"],schools:["Republic", "Diplomacy", "Democratic"],subregions:["Antebellum"],dynasty:"",party:"Democratic",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1857, "end": 1861}],orgs:[{name:"United States",role:"President (1857–1861)"}],bio:"Only bachelor president. Failed to prevent Southern secession. Left Lincoln a nation in crisis."},
  {id:216,name:"Abraham Lincoln",birth:1809,death:1865,region:"USA",fields:["Politics", "Philosophy"],schools:["Republic", "Federalism", "Nationalism", "Republican"],subregions:["Civil War"],dynasty:"",party:"Republican",roles:["Head of State", "Military Commander"],terms:[{"role": "President", "org": "United States", "start": 1861, "end": 1865}],orgs:[{name:"United States",role:"President (1861–1865)"}],bio:"Preserved the Union through the Civil War. Emancipated the slaves. Assassinated by John Wilkes Booth. Widely considered greatest US president."},
  {id:217,name:"Andrew Johnson",birth:1808,death:1875,region:"USA",fields:["Politics"],schools:["Republic", "National Union"],subregions:["Reconstruction"],dynasty:"",party:"National Union",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1865, "end": 1869}],orgs:[{name:"United States",role:"President (1865–1869)"}],bio:"Succeeded Lincoln. Clashed with Radical Republicans over Reconstruction. First president to be impeached."},
  {id:218,name:"Ulysses S. Grant",birth:1822,death:1885,region:"USA",fields:["Military", "Politics"],schools:["General", "Republic", "Federalism", "Republican"],subregions:["Civil War", "Reconstruction"],dynasty:"",party:"Republican",roles:["Head of State", "Military Commander"],terms:[{"role": "President", "org": "United States", "start": 1869, "end": 1877}],orgs:[{name:"United States",role:"President (1869–1877)"},{name:"Union Army",role:"General-in-Chief"}],bio:"Greatest Union general. As president oversaw Reconstruction but his administration was marred by corruption scandals."},
  {id:219,name:"Rutherford B. Hayes",birth:1822,death:1893,region:"USA",fields:["Politics", "Military"],schools:["Republic", "Republican"],subregions:["Reconstruction"],dynasty:"",party:"Republican",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1877, "end": 1881}],orgs:[{name:"United States",role:"President (1877–1881)"}],bio:"Disputed election of 1876. Ended Reconstruction by withdrawing federal troops from the South."},
  {id:220,name:"James A. Garfield",birth:1831,death:1881,region:"USA",fields:["Politics", "Military"],schools:["Republic", "Republican"],subregions:["Reconstruction"],dynasty:"",party:"Republican",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1881, "end": 1881}],orgs:[{name:"United States",role:"President (1881)"}],bio:"Assassinated after only 200 days in office. His slow death from infection rather than the bullet shocked the nation."},
  {id:221,name:"Chester A. Arthur",birth:1829,death:1886,region:"USA",fields:["Politics"],schools:["Republic", "Republican"],subregions:["Reconstruction"],dynasty:"",party:"Republican",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1881, "end": 1885}],orgs:[{name:"United States",role:"President (1881–1885)"}],bio:"Reformed the civil service despite being a product of machine politics. Known for his elegant style."},
  {id:222,name:"Grover Cleveland",birth:1837,death:1908,region:"USA",fields:["Politics"],schools:["Republic", "Democratic"],subregions:["Reconstruction"],dynasty:"",party:"Democratic",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1885, "end": 1889}, {"role": "President", "org": "United States", "start": 1893, "end": 1897}],orgs:[{name:"United States",role:"President (1885–1889, 1893–1897)"}],bio:"Only president to serve two non-consecutive terms — 22nd and 24th president. Known for honesty and fiscal conservatism."},
  {id:223,name:"Benjamin Harrison",birth:1833,death:1901,region:"USA",fields:["Politics", "Military"],schools:["Republic", "Republican"],subregions:["Reconstruction"],dynasty:"",party:"Republican",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1889, "end": 1893}],orgs:[{name:"United States",role:"President (1889–1893)"}],bio:"Grandson of William Henry Harrison. Six states admitted to the Union during his term."},
  {id:224,name:"William McKinley",birth:1843,death:1901,region:"USA",fields:["Politics", "Military"],schools:["Republic", "Empire", "Nationalism", "Republican"],subregions:["Reconstruction"],dynasty:"",party:"Republican",roles:["Head of State", "Military Commander"],terms:[{"role": "President", "org": "United States", "start": 1897, "end": 1901}],orgs:[{name:"United States",role:"President (1897–1901)"}],bio:"Spanish-American War made the US a world power. Acquired Philippines, Guam, Puerto Rico. Assassinated by an anarchist."},
  {id:225,name:"Theodore Roosevelt",birth:1858,death:1919,region:"USA",fields:["Politics", "Military", "Science"],schools:["Republic", "Nationalism", "Natural History", "Republican"],subregions:["Early Republic"],dynasty:"",party:"Republican",roles:["Head of State", "Military Commander"],terms:[{"role": "President", "org": "United States", "start": 1901, "end": 1909}],orgs:[{name:"United States",role:"President (1901–1909)"}],bio:"Trust-buster. Conservation pioneer. Nobel Peace Prize for mediating Russo-Japanese War. Youngest president at 42. 'Speak softly and carry a big stick.'"},
  {id:226,name:"William Howard Taft",birth:1857,death:1930,region:"USA",fields:["Politics"],schools:["Republic", "Republican"],subregions:["Early Republic"],dynasty:"",party:"Republican",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1909, "end": 1913}],orgs:[{name:"United States",role:"President (1909–1913)"},{name:"US Supreme Court",role:"Chief Justice (1921–1930)"}],bio:"Only person to be both President and Chief Justice of the Supreme Court."},
  {id:227,name:"Woodrow Wilson",birth:1856,death:1924,region:"USA",fields:["Politics", "Philosophy"],schools:["Republic", "Diplomacy", "Nationalism", "Democratic"],subregions:["Early Republic"],dynasty:"",party:"Democratic",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1913, "end": 1921}],orgs:[{name:"United States",role:"President (1913–1921)"}],bio:"Led US through WWI. Proposed the League of Nations (14 Points). Suffered a debilitating stroke. Nobel Peace Prize 1919."},
  {id:228,name:"Warren G. Harding",birth:1865,death:1923,region:"USA",fields:["Politics"],schools:["Republic", "Republican"],subregions:["Early Republic"],dynasty:"",party:"Republican",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1921, "end": 1923}],orgs:[{name:"United States",role:"President (1921–1923)"}],bio:"Died in office. His administration was riddled with corruption (Teapot Dome scandal)."},
  {id:229,name:"Calvin Coolidge",birth:1872,death:1933,region:"USA",fields:["Politics"],schools:["Republic", "Republican"],subregions:["Early Republic"],dynasty:"",party:"Republican",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1923, "end": 1929}],orgs:[{name:"United States",role:"President (1923–1929)"}],bio:"'Silent Cal'. Pro-business, minimal government. Presided over the Roaring Twenties prosperity."},
  {id:230,name:"Herbert Hoover",birth:1874,death:1964,region:"USA",fields:["Politics"],schools:["Republic", "Republican"],subregions:["Early Republic"],dynasty:"",party:"Republican",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1929, "end": 1933}],orgs:[{name:"United States",role:"President (1929–1933)"}],bio:"The Great Depression began months into his presidency. His perceived inaction cost him re-election to FDR."},
  {id:231,name:"Franklin D. Roosevelt",birth:1882,death:1945,region:"USA",fields:["Politics", "Military"],schools:["Republic", "Federalism", "Diplomacy", "Democratic"],subregions:["Early Republic"],dynasty:"",party:"Democratic",roles:["Head of State", "Military Commander"],terms:[{"role": "President", "org": "United States", "start": 1933, "end": 1945}],orgs:[{name:"United States",role:"President (1933–1945)"}],bio:"Only president elected four times. New Deal rescued the economy. Led the US through WWII. Died just before Allied victory."},
  {id:232,name:"Harry S. Truman",birth:1884,death:1972,region:"USA",fields:["Politics", "Military"],schools:["Republic", "General", "Democratic"],subregions:["Early Republic"],dynasty:"",party:"Democratic",roles:["Head of State", "Military Commander"],terms:[{"role": "President", "org": "United States", "start": 1945, "end": 1953}],orgs:[{name:"United States",role:"President (1945–1953)"}],bio:"Authorized atomic bombs on Japan. Marshall Plan rebuilt Europe. NATO founder. Korean War."},
  {id:233,name:"Dwight D. Eisenhower",birth:1890,death:1969,region:"USA",fields:["Politics", "Military"],schools:["General", "Republic", "Diplomacy", "Republican"],subregions:["Early Republic"],dynasty:"",party:"Republican",roles:["Head of State", "Military Commander"],terms:[{"role": "President", "org": "United States", "start": 1953, "end": 1961}],orgs:[{name:"United States",role:"President (1953–1961)"},{name:"Allied Forces Europe",role:"Supreme Commander (WWII)"}],bio:"WWII Supreme Commander. Interstate Highway System. Warned against the military-industrial complex in his farewell address."},
  {id:234,name:"John F. Kennedy",birth:1917,death:1963,region:"USA",fields:["Politics", "Military"],schools:["Republic", "Diplomacy", "Nationalism", "Democratic"],subregions:["Early Republic"],dynasty:"",party:"Democratic",roles:["Head of State", "Military Commander"],terms:[{"role": "President", "org": "United States", "start": 1961, "end": 1963}],orgs:[{name:"United States",role:"President (1961–1963)"}],bio:"Cuban Missile Crisis. Space race ('We choose to go to the Moon'). Youngest elected president. Assassinated in Dallas."},
  {id:235,name:"Lyndon B. Johnson",birth:1908,death:1973,region:"USA",fields:["Politics"],schools:["Republic", "Federalism", "Democratic"],subregions:["Early Republic"],dynasty:"",party:"Democratic",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1963, "end": 1969}],orgs:[{name:"United States",role:"President (1963–1969)"}],bio:"Great Society programs: Civil Rights Act, Medicare, Medicaid. Vietnam War escalation destroyed his presidency."},
  {id:236,name:"Richard Nixon",birth:1913,death:1994,region:"USA",fields:["Politics", "Diplomacy"],schools:["Republic", "Diplomacy", "Republican"],subregions:["Early Republic"],dynasty:"",party:"Republican",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1969, "end": 1974}],orgs:[{name:"United States",role:"President (1969–1974)"}],bio:"Opened China. Ended Vietnam War. Watergate scandal. Only president to resign from office."},
  {id:237,name:"Gerald Ford",birth:1913,death:2006,region:"USA",fields:["Politics", "Military"],schools:["Republic", "Republican"],subregions:["Early Republic"],dynasty:"",party:"Republican",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1974, "end": 1977}],orgs:[{name:"United States",role:"President (1974–1977)"}],bio:"Only president never elected as President or VP. Pardoned Nixon. 'Our long national nightmare is over.'"},
  {id:238,name:"Jimmy Carter",birth:1924,death:2024,region:"USA",fields:["Politics", "Diplomacy"],schools:["Republic", "Diplomacy", "Democratic"],subregions:["Early Republic"],dynasty:"",party:"Democratic",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1977, "end": 1981}],orgs:[{name:"United States",role:"President (1977–1981)"}],bio:"Camp David Accords. Iran hostage crisis hurt re-election. Post-presidency humanitarian work; Nobel Peace Prize 2002. Longest-lived president."},
  {id:239,name:"Ronald Reagan",birth:1911,death:2004,region:"USA",fields:["Politics", "Art"],schools:["Republic", "Nationalism", "Republican"],subregions:["Early Republic"],dynasty:"",party:"Republican",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1981, "end": 1989}],orgs:[{name:"United States",role:"President (1981–1989)"}],bio:"Cold War victory. Reaganomics. Iran-Contra affair. 'Mr. Gorbachev, tear down this wall!' Former actor."},
  {id:240,name:"George H.W. Bush",birth:1924,death:2018,region:"USA",fields:["Politics", "Military", "Diplomacy"],schools:["Republic", "Diplomacy", "General", "Republican"],subregions:["Early Republic"],dynasty:"",party:"Republican",roles:["Head of State", "Military Commander"],terms:[{"role": "President", "org": "United States", "start": 1989, "end": 1993}],orgs:[{name:"United States",role:"President (1989–1993)"},{name:"CIA",role:"Director (1976–1977)"}],bio:"Managed the end of the Cold War and German reunification. Gulf War liberated Kuwait. Lost re-election to Clinton."},
  {id:241,name:"Bill Clinton",birth:1946,death:2026,region:"USA",fields:["Politics"],schools:["Republic", "Diplomacy", "Democratic"],subregions:["Early Republic"],dynasty:"",party:"Democratic",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 1993, "end": 2001}],orgs:[{name:"United States",role:"President (1993–2001)"}],bio:"Presided over economic boom of the 1990s. NAFTA. Balanced the budget. Impeached over Monica Lewinsky scandal but acquitted."},
  {id:242,name:"George W. Bush",birth:1946,death:2026,region:"USA",fields:["Politics", "Military"],schools:["Republic", "Nationalism", "Republican"],subregions:["Early Republic"],dynasty:"",party:"Republican",roles:["Head of State", "Military Commander"],terms:[{"role": "President", "org": "United States", "start": 2001, "end": 2009}],orgs:[{name:"United States",role:"President (2001–2009)"}],bio:"9/11 and the War on Terror. Invaded Afghanistan and Iraq. Financial crisis hit in last months of presidency."},
  {id:243,name:"Barack Obama",birth:1961,death:2026,region:"USA",fields:["Politics", "Philosophy"],schools:["Republic", "Diplomacy", "Federalism", "Democratic"],subregions:["Early Republic"],dynasty:"",party:"Democratic",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 2009, "end": 2017}],orgs:[{name:"United States",role:"President (2009–2017)"}],bio:"First African-American president. Affordable Care Act. Ordered killing of Osama bin Laden. Nobel Peace Prize 2009."},
  {id:244,name:"Donald Trump",birth:1946,death:2026,region:"USA",fields:["Politics"],schools:["Nationalism", "Republic", "Republican"],subregions:["Early Republic"],dynasty:"",party:"Republican",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 2017, "end": 2021}, {"role": "President", "org": "United States", "start": 2025, "end": 2026}],orgs:[{name:"United States",role:"President (2017–2021, 2025–present)"}],bio:"Businessman turned politician. America First policy. Impeached twice. Lost 2020 election to Biden. Returned to win 2024 election."},
  {id:245,name:"Joe Biden",birth:1942,death:2026,region:"USA",fields:["Politics", "Diplomacy"],schools:["Republic", "Federalism", "Diplomacy", "Democratic"],subregions:["Early Republic"],dynasty:"",party:"Democratic",roles:["Head of State"],terms:[{"role": "President", "org": "United States", "start": 2021, "end": 2025}],orgs:[{name:"United States",role:"President (2021–2025)"}],bio:"Oldest person elected US president. Infrastructure law, Inflation Reduction Act. Withdrew from 2024 race. Supported Ukraine against Russian invasion."},
  {id:301,name:"Hannibal Barca",birth:-247,death:-183,region:"Persia",fields:["Military"],schools:["General", "Strategist", "Cavalry"],subregions:["Carthage"],dynasty:"",party:"",roles:["Military Commander"],terms:[],orgs:[{name:"Carthage",role:"General"}],bio:"Greatest general of antiquity who crossed the Alps with war elephants and nearly destroyed Rome. Won at Cannae (216 BC) — still studied in military academies. Ultimately defeated by Scipio at Zama."},
  {id:302,name:"Scipio Africanus",birth:-236,death:-183,region:"Rome",fields:["Military", "Politics"],schools:["General", "Strategist"],subregions:["Roman Republic"],dynasty:"",party:"",roles:["Military Commander"],terms:[],orgs:[{name:"Roman Republic",role:"General & Consul"}],bio:"Defeated Hannibal at the Battle of Zama (202 BC), ending the Second Punic War. Considered the greatest Roman general before Caesar."},
  {id:303,name:"Attila the Hun",birth:406,death:453,region:"Persia",fields:["Military", "Politics"],schools:["General", "Empire", "Cavalry"],subregions:["Steppe"],dynasty:"",party:"",roles:["Head of State", "Military Commander"],terms:[],orgs:[{name:"Hunnic Empire",role:"King (434–453)"}],bio:"The Scourge of God. Devastated the Eastern Roman Empire and invaded Gaul and Italy. His death saved Rome from conquest. The Hunnic Empire collapsed immediately after him."},
  {id:304,name:"Khalid ibn al-Walid",birth:585,death:642,region:"Arabia",fields:["Military"],schools:["General", "Strategist", "Cavalry"],subregions:["Arabia"],dynasty:"",party:"",roles:["Military Commander"],terms:[],orgs:[{name:"Rashidun Caliphate",role:"Commander (undefeated)"}],bio:"Undefeated in over 100 battles. Commanded the Muslim armies that conquered Arabia, Persia, and Byzantine Syria in the fastest territorial expansion in history. Called the Sword of Allah."},
  {id:305,name:"Saladin",birth:1137,death:1193,region:"Persia",fields:["Military", "Politics", "Religion"],schools:["General", "Islam", "Diplomacy"],subregions:["Ottoman"],dynasty:"Ayyubid Dynasty",party:"",roles:["Head of State", "Military Commander"],terms:[],orgs:[{name:"Ayyubid Sultanate",role:"Sultan"},{name:"Jerusalem",role:"Conqueror (1187)"}],bio:"Kurdish-born Muslim sultan who united the Islamic world and recaptured Jerusalem from the Crusaders in 1187. Renowned for chivalry toward defeated enemies including Richard I."},
  {id:306,name:"Tamerlane",birth:1336,death:1405,region:"Persia",fields:["Military", "Politics"],schools:["General", "Empire", "Cavalry"],subregions:["Central Asia"],dynasty:"Timurid Dynasty",party:"",roles:["Head of State", "Military Commander"],terms:[],orgs:[{name:"Timurid Empire",role:"Emperor (1370–1405)"}],bio:"Last great nomadic conqueror. Devastated Delhi, Baghdad, and Damascus. Built towers of skulls. Yet his capital Samarkand became a center of Islamic art and scholarship."},
  {id:307,name:"Joan of Arc",birth:1412,death:1431,region:"France",fields:["Military", "Religion"],schools:["General", "Catholicism", "Nationalism"],subregions:["Medieval France"],dynasty:"",party:"",roles:["Military Commander"],terms:[],orgs:[{name:"Kingdom of France",role:"Military Commander"}],bio:"Peasant girl who claimed divine visions, led French armies to decisive victories in the Hundred Years' War, and turned the tide for Charles VII. Captured, tried for heresy, burned at the stake aged 19. Canonized 1920."},
  {id:308,name:"Hernán Cortés",birth:1485,death:1547,region:"Spain",fields:["Military", "Politics"],schools:["General", "Empire", "Colonial"],subregions:["Spain"],dynasty:"",party:"",roles:["Military Commander"],terms:[],orgs:[{name:"Spanish Empire",role:"Conquistador"},{name:"Aztec Empire",role:"Conqueror (1521)"}],bio:"Conquered the Aztec Empire with ~500 men, horses, and indigenous allies. One of the most audacious military campaigns in history. His conquest ended Mesoamerican civilization and began New Spain."},
  {id:309,name:"Francisco Pizarro",birth:1471,death:1541,region:"Spain",fields:["Military", "Politics"],schools:["General", "Empire", "Colonial"],subregions:["Spain"],dynasty:"",party:"",roles:["Military Commander"],terms:[],orgs:[{name:"Spanish Empire",role:"Conquistador"},{name:"Inca Empire",role:"Conqueror (1532)"}],bio:"Conquered the Inca Empire with 168 soldiers. Captured and executed Atahualpa. His conquest destroyed the largest empire in the Americas."},
  {id:310,name:"Duke of Wellington",birth:1769,death:1852,region:"England",fields:["Military", "Politics"],schools:["General", "Naval", "Diplomacy"],subregions:["Victorian"],dynasty:"",party:"",roles:["Military Commander", "Head of State"],terms:[{"role": "Prime Minister", "org": "United Kingdom", "start": 1828, "end": 1830}],orgs:[{name:"British Army",role:"Field Marshal"},{name:"United Kingdom",role:"Prime Minister (1828–1830)"}],bio:"Defeated Napoleon at Waterloo (1815). Iron Duke. Later served as Prime Minister. Never lost a battle in his career."},
  {id:311,name:"Erwin Rommel",birth:1891,death:1944,region:"Germany",fields:["Military"],schools:["General", "Strategist"],subregions:["Germany"],dynasty:"",party:"",roles:["Military Commander"],terms:[],orgs:[{name:"German Army",role:"Field Marshal"},{name:"Afrika Korps",role:"Commander"}],bio:"The Desert Fox. Brilliant tank commander in WWII North Africa. Respected by enemies for his chivalry. Implicated in the July 1944 plot against Hitler — forced to commit suicide."},
  {id:312,name:"Georgy Zhukov",birth:1896,death:1974,region:"Russia",fields:["Military"],schools:["General", "Strategist"],subregions:["Russia"],dynasty:"",party:"",roles:["Military Commander"],terms:[],orgs:[{name:"Soviet Red Army",role:"Marshal of the Soviet Union"}],bio:"Greatest Allied commander of WWII. Saved Moscow, broke the Siege of Leningrad, commanded at Stalingrad and Kursk, and took Berlin. Arguably the man who did most to win the Second World War."},
  {id:313,name:"Vo Nguyen Giap",birth:1911,death:2013,region:"China",fields:["Military", "Politics"],schools:["General", "Revolutionary", "Guerrilla"],subregions:["Vietnam"],dynasty:"",party:"",roles:["Military Commander"],terms:[],orgs:[{name:"Vietnam People's Army",role:"General"},{name:"North Vietnam",role:"Defence Minister"}],bio:"Defeated France at Dien Bien Phu (1954) and then defeated the United States by 1975. The only general in history to defeat two of the world's great powers. Fought continuously for 30 years."},
  {id:314,name:"Gustavus Adolphus",birth:1594,death:1632,region:"Germany",fields:["Military", "Politics"],schools:["General", "Strategist", "Naval"],subregions:["Scandinavia"],dynasty:"House of Vasa",party:"",roles:["Head of State", "Military Commander"],terms:[],orgs:[{name:"Kingdom of Sweden",role:"King (1611–1632)"}],bio:"Father of modern warfare. Revolutionized military tactics — combined arms, mobile artillery, musketeers. Dominant force in the Thirty Years' War. Killed at the Battle of Lützen."},
  {id:320,name:"Raphael",birth:1483,death:1520,region:"Italy",fields:["Painting"],schools:["Renaissance Art", "Painting"],subregions:["Florence", "Papal States"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Papal Court",role:"Painter"},{name:"Vatican",role:"Architect of St. Peter's"}],bio:"Master of the High Renaissance trinity with Leonardo and Michelangelo. The School of Athens is considered the perfect embodiment of Renaissance ideals. Died aged 37 — what might have been."},
  {id:321,name:"Caravaggio",birth:1571,death:1610,region:"Italy",fields:["Painting"],schools:["Baroque", "Painting", "Chiaroscuro"],subregions:["Rome", "Naples"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Roman Art World",role:"Painter"}],bio:"Invented chiaroscuro — dramatic contrast of light and dark. Used commoners as models for sacred figures. Murdered a man in a brawl and fled Rome. Influenced virtually every painter who came after him."},
  {id:322,name:"Rembrandt van Rijn",birth:1606,death:1669,region:"Netherlands",fields:["Painting"],schools:["Baroque", "Dutch Golden Age", "Painting"],subregions:["Dutch Republic"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Dutch Art",role:"Painter"}],bio:"Greatest Dutch master. The Night Watch transformed group portraiture. His 80+ self-portraits document his entire life with unflinching honesty. Died in poverty."},
  {id:323,name:"Johannes Vermeer",birth:1632,death:1675,region:"Netherlands",fields:["Painting"],schools:["Dutch Golden Age", "Painting", "Realism"],subregions:["Dutch Republic"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Delft School",role:"Painter"}],bio:"Master of light and domestic interiors. Girl with a Pearl Earring. Only 34-36 verified works exist, yet he is considered among the greatest painters in history."},
  {id:324,name:"Francisco Goya",birth:1746,death:1828,region:"Spain",fields:["Painting"],schools:["Romanticism", "Painting", "Realism"],subregions:["Spain"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Spanish Court",role:"Court Painter"}],bio:"The Third of May 1808 and Saturn Devouring His Son. First truly modern artist — depicted war's horror without glory. His Black Paintings are among the most disturbing works ever created."},
  {id:325,name:"Eugène Delacroix",birth:1798,death:1863,region:"France",fields:["Painting"],schools:["Romanticism", "Painting"],subregions:["Renaissance France"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"French Academy",role:"Painter"}],bio:"Liberty Leading the People — the defining image of Romantic painting. Influenced Impressionists directly. His journals are essential reading on the creative process."},
  {id:326,name:"Claude Monet",birth:1840,death:1926,region:"France",fields:["Painting"],schools:["Impressionism", "Painting"],subregions:["Renaissance France"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Impressionist Movement",role:"Founder"}],bio:"Founded Impressionism — the word came mockingly from his painting Impression, Sunrise. His Waterlilies series, painted while going blind, is among the greatest achievements in art."},
  {id:327,name:"Vincent van Gogh",birth:1853,death:1890,region:"Netherlands",fields:["Painting"],schools:["Post-Impressionism", "Painting"],subregions:["Dutch Republic"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Post-Impressionism",role:"Painter"}],bio:"The Starry Night, Sunflowers, self-portraits. Sold one painting in his lifetime. His 900 paintings and 1,100 drawings, created in 10 years of feverish work, changed the direction of Western art."},
  {id:328,name:"Pablo Picasso",birth:1881,death:1973,region:"France",fields:["Painting"],schools:["Cubism", "Painting", "Modernism"],subregions:["Renaissance France"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Cubist Movement",role:"Co-founder"}],bio:"Invented Cubism with Braque. Guernica is the greatest anti-war painting ever made. Most prolific and financially successful artist in history — over 20,000 works."},
  {id:329,name:"Salvador Dalí",birth:1904,death:1989,region:"Spain",fields:["Painting"],schools:["Surrealism", "Painting"],subregions:["Spain"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Surrealist Movement",role:"Member"}],bio:"The Persistence of Memory. Collaborated with Buñuel on Un Chien Andalou. Self-promoter of genius. His paranoia-critical method and dreamlike imagery made him the most famous Surrealist."},
