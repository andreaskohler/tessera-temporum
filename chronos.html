  {id:330,name:"Frida Kahlo",birth:1907,death:1954,region:"USA",fields:["Painting"],schools:["Surrealism", "Painting", "Symbolism"],subregions:["Mexico"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Mexican Art",role:"Painter"}],bio:"Her 55 self-portraits confront pain, identity, gender and Mexican culture with brutal honesty. Polio and a near-fatal bus accident shaped her work. André Breton called her a ribbon around a bomb."},
  {id:331,name:"Peter Paul Rubens",birth:1577,death:1640,region:"Netherlands",fields:["Painting"],schools:["Baroque", "Painting", "Flemish"],subregions:["Dutch Republic"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Flemish Baroque",role:"Master Painter"}],bio:"Greatest Flemish Baroque painter. His exuberant, sensual figures defined the era. Also served as a diplomat for the Spanish Netherlands — the original artist-diplomat."},
  {id:335,name:"Phidias",birth:-490,death:-430,region:"Greece",fields:["Painting"],schools:["Classical Sculpture", "Architecture"],subregions:["Athens"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Athens",role:"Sculptor"},{name:"Parthenon",role:"Designer of Sculptures"}],bio:"Greatest sculptor of ancient Greece. Oversaw the Parthenon sculptures and created the colossal Statue of Zeus at Olympia — one of the Seven Wonders of the Ancient World."},
  {id:336,name:"Donatello",birth:1386,death:1466,region:"Italy",fields:["Painting"],schools:["Renaissance Art", "Classical Sculpture", "Sculpture"],subregions:["Florence"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Florentine Art",role:"Sculptor"}],bio:"First sculptor to create a free-standing nude since antiquity. His David preceded Michelangelo's by 60 years. Transformed sculpture from medieval relief to Renaissance realism."},
  {id:337,name:"Gian Lorenzo Bernini",birth:1598,death:1680,region:"Italy",fields:["Architecture", "Painting"],schools:["Baroque", "Sculpture", "Architecture"],subregions:["Rome"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Vatican",role:"Architect & Sculptor"},{name:"St. Peter's Square",role:"Designer"}],bio:"Greatest Baroque sculptor and architect. Designed St. Peter's Square, the Baldachin inside St. Peter's, and the Ecstasy of Saint Teresa — marble that appears to breathe."},
  {id:338,name:"Auguste Rodin",birth:1840,death:1917,region:"France",fields:["Painting"],schools:["Sculpture", "Realism", "Modernism"],subregions:["Renaissance France"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"French Art",role:"Sculptor"}],bio:"The Thinker, The Kiss, Gates of Hell. Rejected by the École des Beaux-Arts three times, became the father of modern sculpture. His unfinished surfaces were revolutionary."},
  {id:340,name:"Imhotep",birth:-2650,death:-2600,region:"Egypt",fields:["Architecture", "Science", "Religion"],schools:["Ancient Architecture", "Medicine", "Mathematics"],subregions:["Old Kingdom"],dynasty:"",party:"",roles:["Architect", "Physician", "Philosopher"],terms:[],orgs:[{name:"Ancient Egypt",role:"Chief Architect & Physician to Pharaoh Djoser"}],bio:"First named architect in history. Designed the Step Pyramid at Saqqara (2650 BC) — humanity's first monumental stone building. Also a physician, sage and eventually deified. The Leonardo da Vinci of the ancient world."},
  {id:341,name:"Filippo Brunelleschi",birth:1377,death:1446,region:"Italy",fields:["Architecture", "Science"],schools:["Renaissance Architecture", "Architecture", "Mathematics"],subregions:["Florence"],dynasty:"",party:"",roles:["Architect"],terms:[],orgs:[{name:"Florence Cathedral",role:"Architect of the Dome"}],bio:"Built the Florence Cathedral dome without scaffolding — the largest masonry dome ever constructed, still the largest brick dome. Also invented linear perspective, transforming painting forever."},
  {id:342,name:"Andrea Palladio",birth:1508,death:1580,region:"Italy",fields:["Architecture"],schools:["Renaissance Architecture", "Architecture", "Neoclassical"],subregions:["Venice"],dynasty:"",party:"",roles:["Architect"],terms:[],orgs:[{name:"Venetian Republic",role:"Architect"}],bio:"His Four Books of Architecture influenced every Western building for 400 years. Palladian architecture shaped the US Capitol, the White House, and thousands of country houses. The most influential architect in history."},
  {id:343,name:"Christopher Wren",birth:1632,death:1723,region:"England",fields:["Architecture", "Science"],schools:["Baroque Architecture", "Architecture", "Mathematics", "Astronomy"],subregions:["Stuart"],dynasty:"",party:"",roles:["Architect"],terms:[],orgs:[{name:"City of London",role:"Surveyor General"},{name:"St. Paul's Cathedral",role:"Architect"}],bio:"Rebuilt London after the Great Fire of 1666 — designed 52 churches including St. Paul's Cathedral. Also a founding member of the Royal Society and accomplished astronomer."},
  {id:345,name:"Le Corbusier",birth:1887,death:1965,region:"France",fields:["Architecture", "Philosophy"],schools:["Modernism", "Architecture", "Bauhaus", "International Style"],subregions:["Renaissance France"],dynasty:"",party:"",roles:["Architect"],terms:[],orgs:[{name:"Modern Architecture",role:"Pioneer"}],bio:"A house is a machine for living in. Invented the International Style — pure geometry, pilotis, roof gardens. Designed Chandigarh (India), Unité d'Habitation. Most influential and controversial architect of the 20th century."},
  {id:346,name:"Frank Lloyd Wright",birth:1867,death:1959,region:"USA",fields:["Architecture"],schools:["Organic Architecture", "Architecture", "Modernism"],subregions:["Early Republic"],dynasty:"",party:"",roles:["Architect"],terms:[],orgs:[{name:"American Architecture",role:"Pioneer"}],bio:"Fallingwater, the Guggenheim Museum, the Prairie Style house. Organic architecture — buildings that grow from their site. Designed over 1,000 structures. Active for 70 years."},
  {id:347,name:"Walter Gropius",birth:1883,death:1969,region:"Germany",fields:["Architecture", "Philosophy"],schools:["Bauhaus", "Architecture", "Modernism"],subregions:["Germany"],dynasty:"",party:"",roles:["Architect"],terms:[],orgs:[{name:"Bauhaus",role:"Founder (1919)"}],bio:"Founded the Bauhaus school in Weimar in 1919 — the most influential art and design school ever. Unified fine art, craft and industrial design. Fled Nazi Germany for Harvard where he shaped a generation of architects."},
  {id:348,name:"Ludwig Mies van der Rohe",birth:1886,death:1969,region:"Germany",fields:["Architecture"],schools:["Bauhaus", "Architecture", "Modernism", "International Style"],subregions:["Germany"],dynasty:"",party:"",roles:["Architect"],terms:[],orgs:[{name:"Bauhaus",role:"Last Director (1930–1933)"},{name:"Modern Architecture",role:"Pioneer"}],bio:"Less is more. God is in the details. Designed the Barcelona Pavilion and Lake Shore Drive Apartments. Last director of the Bauhaus. The glass skyscraper is essentially his invention."},
  {id:349,name:"Antoni Gaudí",birth:1852,death:1926,region:"Spain",fields:["Architecture", "Religion"],schools:["Architecture", "Organic Architecture", "Catalan Modernisme"],subregions:["Spain"],dynasty:"",party:"",roles:["Architect"],terms:[],orgs:[{name:"Sagrada Família",role:"Architect (1883–1926)"}],bio:"The Sagrada Família, Park Güell, Casa Batlló. His organic, nature-inspired architecture is unlike anything else. Deeply devout Catholic — spent his last years living in the crypt of the Sagrada Família, still unfinished at his death."},
  {id:350,name:"Oscar Niemeyer",birth:1907,death:2012,region:"USA",fields:["Architecture"],schools:["Modernism", "Architecture", "International Style"],subregions:["Brazil"],dynasty:"",party:"",roles:["Architect"],terms:[],orgs:[{name:"Brasília",role:"Chief Architect (1956–1960)"}],bio:"Designed virtually all of Brasília — the most ambitious planned capital in history. His curves defied the right-angle orthodoxy of International Style. Active until age 104."},
  {id:351,name:"Zaha Hadid",birth:1950,death:2016,region:"Persia",fields:["Architecture"],schools:["Architecture", "Deconstructivism", "Parametric Design"],subregions:["Iraq"],dynasty:"",party:"",roles:["Architect"],terms:[],orgs:[{name:"Zaha Hadid Architects",role:"Founder"}],bio:"First woman to win the Pritzker Prize (2004). Her swooping, gravity-defying forms — MAXXI Rome, London Aquatics Centre, Guangzhou Opera House — redefined what buildings could look like."},
  {id:355,name:"Homer",birth:-800,death:-701,region:"Greece",fields:["Literature", "Philosophy"],schools:["Ancient Epic", "Poetry", "Literature"],subregions:["Ionia"],dynasty:"",party:"",roles:["Writer / Poet"],terms:[],orgs:[{name:"Ancient Greece",role:"Epic Poet"}],bio:"Author of the Iliad and Odyssey — the foundational texts of Western literature. Whether one person or a tradition, Homer shaped Greek education, values and identity for a thousand years. Still read 2,800 years later."},
  {id:356,name:"Virgil",birth:-70,death:-19,region:"Rome",fields:["Literature"],schools:["Ancient Epic", "Poetry", "Literature"],subregions:["Roman Republic"],dynasty:"",party:"",roles:["Writer / Poet"],terms:[],orgs:[{name:"Roman Literature",role:"Epic Poet"},{name:"Augustus's Court",role:"Court Poet"}],bio:"The Aeneid gave Rome its founding myth and shaped medieval and Renaissance literature. Dante chose him as guide through Hell and Purgatory. The greatest Latin poet."},
  {id:357,name:"Dante Alighieri",birth:1265,death:1321,region:"Italy",fields:["Literature", "Philosophy", "Religion"],schools:["Literature", "Poetry", "Medieval", "Scholasticism"],subregions:["Florence"],dynasty:"",party:"",roles:["Writer / Poet"],terms:[],orgs:[{name:"Florence",role:"Poet & Statesman"}],bio:"The Divine Comedy defined the Italian language and set the template for Western literature. Inferno's vivid hell, Purgatorio's moral journey, Paradiso's mystical vision. Exiled from Florence and never returned."},
  {id:358,name:"Geoffrey Chaucer",birth:1343,death:1400,region:"England",fields:["Literature"],schools:["Literature", "Poetry", "Medieval"],subregions:["Medieval England"],dynasty:"",party:"",roles:["Writer / Poet"],terms:[],orgs:[{name:"English Court",role:"Poet & Diplomat"}],bio:"The Canterbury Tales defined the English language and literary tradition. First great English poet. Used vernacular English when Latin was the prestige language — a radical democratic act."},
  {id:359,name:"William Shakespeare",birth:1564,death:1616,region:"England",fields:["Literature", "Philosophy"],schools:["Literature", "Poetry", "Drama", "Renaissance Art"],subregions:["Tudor", "Stuart"],dynasty:"",party:"",roles:["Writer / Poet"],terms:[],orgs:[{name:"Globe Theatre",role:"Playwright & Actor"}],bio:"Hamlet, Macbeth, King Lear, Othello, Romeo and Juliet. Invented over 1,700 words still in common use. The greatest writer in the English language, possibly in any language. His works have never left the stage."},
  {id:360,name:"Miguel de Cervantes",birth:1547,death:1616,region:"Spain",fields:["Literature"],schools:["Literature", "Realism"],subregions:["Spain"],dynasty:"",party:"",roles:["Writer / Poet"],terms:[],orgs:[{name:"Spanish Literature",role:"Novelist"}],bio:"Don Quixote (1605) is considered the first modern novel and the greatest work of fiction ever written. Cervantes lost the use of his left hand at the Battle of Lepanto. Died the same day as Shakespeare."},
  {id:361,name:"Johann Wolfgang von Goethe",birth:1749,death:1832,region:"Germany",fields:["Literature", "Science", "Philosophy"],schools:["Literature", "Romanticism", "Poetry", "Natural History"],subregions:["Germany"],dynasty:"",party:"",roles:["Writer / Poet", "Scientist"],terms:[],orgs:[{name:"Weimar Court",role:"Poet, Playwright & Scientist"}],bio:"Faust is the central work of German literature. Also wrote The Sorrows of Young Werther (triggered a wave of copycat suicides across Europe). Conducted serious botanical and optical research. The last true Renaissance man."},
  {id:362,name:"Leo Tolstoy",birth:1828,death:1910,region:"Russia",fields:["Literature", "Philosophy", "Religion"],schools:["Literature", "Realism", "Pacifism"],subregions:["Russia"],dynasty:"",party:"",roles:["Writer / Poet", "Philosopher"],terms:[],orgs:[{name:"Russian Literature",role:"Novelist"}],bio:"War and Peace and Anna Karenina are the twin peaks of the realist novel. Later renounced his aristocratic life and wealth, became a Christian anarchist and pacifist. Influenced Gandhi and Martin Luther King."},
  {id:363,name:"Fyodor Dostoyevsky",birth:1821,death:1881,region:"Russia",fields:["Literature", "Philosophy"],schools:["Literature", "Existentialism", "Christianity", "Realism"],subregions:["Russia"],dynasty:"",party:"",roles:["Writer / Poet", "Philosopher"],terms:[],orgs:[{name:"Russian Literature",role:"Novelist"}],bio:"Crime and Punishment, The Brothers Karamazov, The Idiot. Sentenced to death, reprieved at the last moment, spent four years in a Siberian labour camp. His psychological depth and moral vision has never been surpassed."},
  {id:364,name:"Franz Kafka",birth:1883,death:1924,region:"Austria",fields:["Literature", "Philosophy"],schools:["Literature", "Modernism", "Existentialism"],subregions:["Habsburg"],dynasty:"",party:"",roles:["Writer / Poet"],terms:[],orgs:[{name:"Czech/German Literature",role:"Novelist"}],bio:"The Trial, The Metamorphosis, The Castle. Kafkaesque has entered the language. Asked his friend Max Brod to burn all his manuscripts after death — Brod published them instead."},
  {id:365,name:"Gabriel García Márquez",birth:1927,death:2014,region:"USA",fields:["Literature"],schools:["Literature", "Magical Realism"],subregions:["Colombia"],dynasty:"",party:"",roles:["Writer / Poet"],terms:[],orgs:[{name:"Latin American Literature",role:"Novelist"}],bio:"One Hundred Years of Solitude invented magical realism as a literary genre and sold 50 million copies. Nobel Prize 1982. His influence on world literature is comparable to Kafka or Joyce."},
  {id:366,name:"Rumi",birth:1207,death:1273,region:"Persia",fields:["Literature", "Philosophy", "Religion"],schools:["Poetry", "Sufism", "Islam", "Mysticism"],subregions:["Persia"],dynasty:"",party:"",roles:["Writer / Poet", "Philosopher", "Religious Leader"],terms:[],orgs:[{name:"Sufi Order",role:"Mystic Poet"}],bio:"The most-read poet in the world today. His Masnavi is called the Persian Quran. Founded the Mevlevi Order (Whirling Dervishes). His poetry on love, loss, and the divine transcends religion and culture."},
  {id:370,name:"Johann Sebastian Bach",birth:1685,death:1750,region:"Germany",fields:["Music"],schools:["Baroque", "Music", "Counterpoint"],subregions:["Germany"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Leipzig Thomaskirche",role:"Cantor"}],bio:"The Well-Tempered Clavier, Mass in B minor, the Goldberg Variations, the Brandenburg Concertos. The foundation of Western music. Largely forgotten after his death, rediscovered by Mendelssohn. Now considered the greatest composer who ever lived."},
  {id:371,name:"George Frideric Handel",birth:1685,death:1759,region:"England",fields:["Music"],schools:["Baroque", "Music", "Opera"],subregions:["Georgian"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Covent Garden",role:"Composer"},{name:"English Court",role:"Court Composer"}],bio:"Messiah's Hallelujah Chorus. Water Music. Born the same year as Bach, died nine years after him. Naturalised British — his oratorios defined English choral tradition. King George II stood for the Hallelujah Chorus, a tradition still maintained."},
  {id:372,name:"Antonio Vivaldi",birth:1678,death:1741,region:"Italy",fields:["Music"],schools:["Baroque", "Music", "Violin"],subregions:["Venice"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Ospedale della Pietà",role:"Violin Master & Composer"}],bio:"The Four Seasons. Over 500 concertos — Bach transcribed many of them. The Red Priest. Died in poverty in Vienna. His music was largely lost until the 20th century when it became the most-recorded Baroque catalogue."},
  {id:373,name:"Wolfgang Amadeus Mozart",birth:1756,death:1791,region:"Austria",fields:["Music"],schools:["Classical Music", "Music", "Opera"],subregions:["Habsburg"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Vienna",role:"Court Composer & Performer"}],bio:"Don Giovanni, The Magic Flute, the Jupiter Symphony, the Requiem. Child prodigy who performed for Empress Maria Theresa. Composed over 600 works by age 35. Died at 35 in poverty. The greatest natural musical talent in history."},
  {id:374,name:"Ludwig van Beethoven",birth:1770,death:1827,region:"Germany",fields:["Music", "Philosophy"],schools:["Classical Music", "Romanticism", "Music"],subregions:["Germany"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Vienna",role:"Composer & Pianist"}],bio:"The Ninth Symphony, composed while totally deaf, premiered to a standing ovation Beethoven could not hear. The Fifth Symphony, the Moonlight Sonata, Fidelio. Single-handedly expanded what music could express. Bridged Classical and Romantic eras."},
  {id:375,name:"Frédéric Chopin",birth:1810,death:1849,region:"France",fields:["Music"],schools:["Romanticism", "Music", "Piano"],subregions:["Poland"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Paris Salons",role:"Composer & Pianist"}],bio:"The poet of the piano. Nocturnes, Études, Ballades, Polonaises. Rarely performed publicly — the intimate salon was his stage. Died of tuberculosis aged 39. His heart was taken back to Poland and entombed in Warsaw."},
  {id:376,name:"Richard Wagner",birth:1813,death:1883,region:"Germany",fields:["Music", "Philosophy"],schools:["Romanticism", "Music", "Opera", "Nationalism"],subregions:["Germany"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Bayreuth Festival",role:"Founder & Composer"}],bio:"The Ring Cycle, Tristan und Isolde, Parsifal. Invented the Gesamtkunstwerk — total artwork unifying music, drama, poetry and visual art. Built his own festival theatre in Bayreuth. His anti-Semitism later associated him with Nazism."},
  {id:377,name:"Giuseppe Verdi",birth:1813,death:1901,region:"Italy",fields:["Music", "Politics"],schools:["Romanticism", "Music", "Opera", "Nationalism"],subregions:["Papal States"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Italian Opera",role:"Composer"},{name:"Italian Parliament",role:"Senator"}],bio:"Rigoletto, La Traviata, Aida, Otello, Falstaff. His operas were inseparable from Italian nationalism — VIVA VERDI was a political slogan. Served as a senator of unified Italy."},
  {id:378,name:"Pyotr Ilyich Tchaikovsky",birth:1840,death:1893,region:"Russia",fields:["Music"],schools:["Romanticism", "Music", "Ballet"],subregions:["Russia"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Russian Imperial Theatre",role:"Composer"}],bio:"Swan Lake, The Nutcracker, Sleeping Beauty, the 1812 Overture, Piano Concerto No. 1. Made Russian music internationally respected. His personal life was tormented — forced into a disastrous marriage, possibly died of cholera, possibly suicide."},
  {id:379,name:"Johannes Brahms",birth:1833,death:1897,region:"Germany",fields:["Music"],schools:["Romanticism", "Music", "Symphony"],subregions:["Germany"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Vienna Philharmonic",role:"Conductor & Composer"}],bio:"Four symphonies, four concertos, a German Requiem. The conservative counterweight to Wagner's revolution. Spent 14 years composing his First Symphony, terrified of Beethoven's shadow. When finally premiered, it was called Beethoven's Tenth."},
  {id:380,name:"Claude Debussy",birth:1862,death:1918,region:"France",fields:["Music"],schools:["Impressionism", "Music", "Symbolism"],subregions:["Renaissance France"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"French Music",role:"Composer"}],bio:"Clair de lune, La Mer, Prélude à l'après-midi d'un faune. Invented musical Impressionism — sound as colour and atmosphere rather than narrative. Broke every rule of classical harmony and created the 20th century."},
  {id:381,name:"Sergei Rachmaninoff",birth:1873,death:1943,region:"Russia",fields:["Music"],schools:["Romanticism", "Music", "Piano"],subregions:["Russia"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Russian Music",role:"Composer & Pianist"}],bio:"Piano Concertos Nos. 2 and 3, the Rhapsody on a Theme of Paganini, Symphony No. 2. Last great Romantic composer. Fled Russia after the revolution. His Second Piano Concerto is the most performed concerto in the repertoire."},
  {id:382,name:"Igor Stravinsky",birth:1882,death:1971,region:"Russia",fields:["Music", "Philosophy"],schools:["20th Century Modern", "Music", "Neo-Classicism"],subregions:["Russia"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Ballets Russes",role:"Composer in Residence"}],bio:"The Rite of Spring (1913) caused a riot at its premiere and changed music forever. The Firebird, Petrushka. Later reinvented himself as a neo-classicist. The most influential composer of the 20th century."},
  {id:383,name:"Dmitri Shostakovich",birth:1906,death:1975,region:"Russia",fields:["Music", "Philosophy"],schools:["20th Century Modern", "Music", "Symphony"],subregions:["Russia"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Soviet Music",role:"Composer"}],bio:"Fifteen symphonies and string quartets that encoded resistance to Stalinist oppression in plain sight. The Seventh (Leningrad) Symphony was performed during the Siege of Leningrad. Twice denounced by Stalin, survived through ambiguity."},
  {id:384,name:"Gustav Mahler",birth:1860,death:1911,region:"Austria",fields:["Music"],schools:["Romanticism", "Music", "Symphony"],subregions:["Habsburg"],dynasty:"",party:"",roles:["Artist"],terms:[],orgs:[{name:"Vienna Court Opera",role:"Director & Composer"}],bio:"Nine completed symphonies of enormous scale — the Eighth requires a thousand performers. His music was banned by the Nazis as degenerate Jewish art. Rediscovered in the 1960s, now considered one of the greatest symphonists."},
  {id:390,name:"Thales of Miletus",birth:-624,death:-546,region:"Greece",fields:["Philosophy", "Science"],schools:["Pre-Socratic", "Mathematics", "Astronomy"],subregions:["Ionia"],dynasty:"",party:"",roles:["Philosopher"],terms:[],orgs:[{name:"Miletus",role:"Philosopher & Scientist"}],bio:"First philosopher in the Western tradition — asked what the world is made of without invoking the gods. Predicted a solar eclipse in 585 BC. Proposed water as the fundamental substance. Founded the Milesian School."},
  {id:391,name:"Pythagoras",birth:-570,death:-495,region:"Greece",fields:["Philosophy", "Science"],schools:["Pre-Socratic", "Mathematics", "Mysticism"],subregions:["Ionia", "Magna Graecia"],dynasty:"",party:"",roles:["Philosopher", "Scientist"],terms:[],orgs:[{name:"Pythagorean Brotherhood",role:"Founder"}],bio:"The Pythagorean theorem. But also: the harmony of the spheres, vegetarianism, the transmigration of souls. Founded a mathematical mystical brotherhood. Believed numbers were the true reality — an idea that runs through all Western mathematics."},
  {id:392,name:"Heraclitus",birth:-535,death:-475,region:"Greece",fields:["Philosophy"],schools:["Pre-Socratic", "Dialectics"],subregions:["Ionia"],dynasty:"",party:"",roles:["Philosopher"],terms:[],orgs:[{name:"Ephesus",role:"Philosopher"}],bio:"You cannot step into the same river twice. Everything flows (panta rhei). The Weeping Philosopher. Believed fire was the fundamental element and that reality is constant change. His fragments influenced Hegel, Marx and Nietzsche."},
  {id:393,name:"Seneca",birth:-4,death:65,region:"Rome",fields:["Philosophy", "Art"],schools:["Stoicism", "Literature", "Drama"],subregions:["Roman Empire"],dynasty:"",party:"",roles:["Philosopher", "Writer / Poet"],terms:[],orgs:[{name:"Roman Court",role:"Advisor to Nero"}],bio:"The most readable Stoic. His Letters to Lucilius remain among the most practical guides to life ever written. Advisor to Emperor Nero, who eventually ordered him to commit suicide. He did so calmly, true to his philosophy."},
  {id:394,name:"Augustine of Hippo",birth:354,death:430,region:"Egypt",fields:["Philosophy", "Religion"],schools:["Theology", "Christianity", "Neoplatonism", "Catholicism"],subregions:["North Africa"],dynasty:"",party:"",roles:["Philosopher", "Religious Leader"],terms:[],orgs:[{name:"Church of Hippo",role:"Bishop"}],bio:"Confessions and The City of God shaped Western theology for a thousand years. His concept of original sin and just war doctrine defined Catholic thought. Before his conversion he wrote: Lord, make me chaste — but not yet."},
  {id:395,name:"Francis Bacon",birth:1561,death:1626,region:"England",fields:["Philosophy", "Science"],schools:["Empiricism", "Scientific Method", "Rationalism"],subregions:["Tudor", "Stuart"],dynasty:"",party:"",roles:["Philosopher"],terms:[],orgs:[{name:"English Court",role:"Lord Chancellor & Philosopher"}],bio:"Father of the scientific method — proposed that knowledge must come from observation and experiment rather than classical authority. Novum Organum revolutionized how humans know things. Died after stuffing a chicken with snow to test refrigeration."},
  {id:396,name:"Gottfried Wilhelm Leibniz",birth:1646,death:1716,region:"Germany",fields:["Philosophy", "Science"],schools:["Rationalism", "Mathematics", "Metaphysics"],subregions:["Germany"],dynasty:"",party:"",roles:["Philosopher", "Scientist"],terms:[],orgs:[{name:"Hanover Court",role:"Philosopher & Diplomat"}],bio:"Invented calculus simultaneously with Newton (bitter priority dispute). Created binary arithmetic — the mathematical foundation of all computing. His optimism that this is the best of all possible worlds was satirized by Voltaire in Candide."},
  {id:397,name:"Georg Wilhelm Friedrich Hegel",birth:1770,death:1831,region:"Germany",fields:["Philosophy"],schools:["Idealism", "Dialectics", "Nationalism"],subregions:["Germany"],dynasty:"",party:"",roles:["Philosopher"],terms:[],orgs:[{name:"University of Berlin",role:"Professor"}],bio:"The Phenomenology of Spirit. Thesis-antithesis-synthesis. History as the unfolding of the World Spirit toward freedom. Arguably the most influential philosopher after Aristotle — Marx, Kierkegaard, Nietzsche and Heidegger all defined themselves against him."},
  {id:398,name:"Søren Kierkegaard",birth:1813,death:1855,region:"Germany",fields:["Philosophy", "Religion"],schools:["Existentialism", "Christianity", "Individualism"],subregions:["Scandinavia"],dynasty:"",party:"",roles:["Philosopher"],terms:[],orgs:[{name:"Copenhagen",role:"Philosopher & Writer"}],bio:"Father of existentialism. Either/Or, Fear and Trembling, The Sickness Unto Death. The leap of faith. Attacked the complacency of the Danish church. Life is understood backwards but must be lived forwards."},
  {id:399,name:"Arthur Schopenhauer",birth:1788,death:1860,region:"Germany",fields:["Philosophy"],schools:["Pessimism", "Metaphysics", "Buddhism"],subregions:["Germany"],dynasty:"",party:"",roles:["Philosopher"],terms:[],orgs:[{name:"Frankfurt",role:"Philosopher"}],bio:"The World as Will and Representation. Life is suffering driven by blind will — anticipating Buddhist thought. Influenced Nietzsche, Freud, Wagner and Einstein. Famously kept poodles named Atma (World Soul)."},
  {id:400,name:"Laozi",birth:-600,death:-500,region:"China",fields:["Philosophy", "Religion"],schools:["Taoism", "Mysticism"],subregions:["Zhou"],dynasty:"Zhou Dynasty",party:"",roles:["Philosopher"],terms:[],orgs:[{name:"Zhou Court",role:"Archivist & Philosopher"}],bio:"Legendary founder of Taoism, traditionally author of the Tao Te Ching. The Tao that can be told is not the eternal Tao. His 81 short chapters on the way of nature, non-action (wu wei) and humility shaped Chinese civilization alongside Confucianism."},
  {id:401,name:"Zhuangzi",birth:-369,death:-286,region:"China",fields:["Philosophy"],schools:["Taoism", "Mysticism", "Naturalism"],subregions:["Zhou"],dynasty:"Zhou Dynasty",party:"",roles:["Philosopher"],terms:[],orgs:[{name:"Warring States China",role:"Philosopher"}],bio:"Once I dreamt I was a butterfly — how do I know I am not now a butterfly dreaming I am a man? The greatest Taoist after Laozi. His playful, paradoxical stories dissolved distinctions between life and death, self and other."},
  {id:402,name:"Mencius",birth:-372,death:-289,region:"China",fields:["Philosophy", "Politics"],schools:["Confucianism", "Moral Philosophy"],subregions:["Zhou"],dynasty:"Zhou Dynasty",party:"",roles:["Philosopher"],terms:[],orgs:[{name:"Warring States China",role:"Philosopher & Advisor"}],bio:"Second Sage after Confucius. Human nature is inherently good. Rulers who lose moral authority lose the Mandate of Heaven — a revolutionary political idea. His humanism made Confucianism a moral rather than merely ritual system."},
  {id:403,name:"Mozi",birth:-470,death:-391,region:"China",fields:["Philosophy", "Science"],schools:["Mohism", "Utilitarianism", "Pacifism"],subregions:["Zhou"],dynasty:"Zhou Dynasty",party:"",roles:["Philosopher"],terms:[],orgs:[{name:"Mohist School",role:"Founder"}],bio:"Founded Mohism — universal love, anti-war, meritocracy. China's first utilitarian philosopher. The Mohist school also conducted experiments in optics and mechanics, making them China's closest equivalent to ancient Greek natural philosophers."},
  {id:404,name:"Ibn Rushd (Averroes)",birth:1126,death:1198,region:"Persia",fields:["Philosophy", "Science"],schools:["Aristotelianism", "Islamic Philosophy", "Medicine"],subregions:["Al-Andalus"],dynasty:"",party:"",roles:["Philosopher", "Physician"],terms:[],orgs:[{name:"Almohad Court",role:"Chief Physician & Philosopher"}],bio:"The Commentator — his commentaries on Aristotle, translated into Latin, reintroduced Aristotle to medieval Europe and sparked the Scholastic revolution (Aquinas, Albertus Magnus). Transmitted the Greek intellectual heritage to Western civilization."},
  {id:405,name:"Ibn Khaldun",birth:1332,death:1406,region:"Egypt",fields:["Philosophy", "Science", "Politics"],schools:["Islamic Philosophy", "Sociology", "Historiography"],subregions:["North Africa"],dynasty:"",party:"",roles:["Philosopher", "Historian"],terms:[],orgs:[{name:"Hafsid Court",role:"Statesman & Scholar"}],bio:"The Muqaddimah (1377) invented sociology, historiography and economics 400 years before their European equivalents. His theory of asabiyyah (social cohesion) and the rise and fall of civilizations is the first scientific philosophy of history."},
  {id:406,name:"Maimonides",birth:1135,death:1204,region:"Egypt",fields:["Philosophy", "Science", "Religion"],schools:["Jewish Philosophy", "Aristotelianism", "Medicine", "Rationalism"],subregions:["Al-Andalus"],dynasty:"",party:"",roles:["Philosopher", "Physician", "Religious Leader"],terms:[],orgs:[{name:"Saladin's Court",role:"Personal Physician"},{name:"Cairo Jewish Community",role:"Chief Rabbi"}],bio:"The Guide for the Perplexed reconciled Aristotle with Jewish scripture, influencing Aquinas and Christian scholasticism. His medical writings were used for 500 years. From Moses to Moses there was none like Moses."},
  {id:407,name:"Nagarjuna",birth:150,death:250,region:"India",fields:["Philosophy", "Religion"],schools:["Buddhism", "Madhyamaka", "Metaphysics"],subregions:["India"],dynasty:"",party:"",roles:["Philosopher", "Religious Leader"],terms:[],orgs:[{name:"Nalanda University",role:"Scholar"}],bio:"Founded Madhyamaka — the middle way philosophy arguing that all phenomena are empty of inherent existence. The most influential Buddhist philosopher after the Buddha himself. His dialectical logic anticipated modern analytical philosophy."},
  {id:408,name:"Adi Shankaracharya",birth:788,death:820,region:"India",fields:["Philosophy", "Religion"],schools:["Advaita Vedanta", "Hinduism", "Metaphysics"],subregions:["India"],dynasty:"",party:"",roles:["Philosopher", "Religious Leader"],terms:[],orgs:[{name:"Advaita Vedanta",role:"Founder"}],bio:"Consolidated Advaita Vedanta — non-dualism — the most influential school of Hindu philosophy. All is Brahman; the individual self (Atman) is identical with the universal (Brahman). Walked across India debating scholars and died aged 32."},
  {id:409,name:"Al-Farabi",birth:872,death:950,region:"Persia",fields:["Philosophy", "Science", "Art"],schools:["Islamic Philosophy", "Neoplatonism", "Music Theory"],subregions:["Persia"],dynasty:"",party:"",roles:["Philosopher"],terms:[],orgs:[{name:"Baghdad",role:"Philosopher & Musician"}],bio:"The Second Teacher — after Aristotle. Synthesized Greek philosophy with Islamic theology. His political philosophy influenced Avicenna and Averroes. Also composed music and wrote the most comprehensive treatise on music theory in the medieval world."},
  {id:420,name:"Mansa Musa",birth:1280,death:1337,region:"Africa",fields:["Politics", "Religion"],schools:["Empire", "Islam", "Diplomacy"],subregions:["West Africa"],dynasty:"Mali Empire",party:"",roles:["Head of State"],terms:[{"role": "Mansa (Emperor)", "org": "Mali Empire", "start": 1312, "end": 1337}],orgs:[{name:"Mali Empire",role:"Mansa (Emperor, 1312–1337)"}],bio:"Richest person in all of human history (adjusted for inflation, ~$400 billion). His 1324 pilgrimage to Mecca with 60,000 attendants and 27 tonnes of gold crashed the Mediterranean gold market for a decade. Built Timbuktu into a center of Islamic learning."},
  {id:421,name:"Sundiata Keita",birth:1217,death:1255,region:"Africa",fields:["Military", "Politics"],schools:["Empire", "General", "Nationalism"],subregions:["West Africa"],dynasty:"Mali Empire",party:"",roles:["Head of State", "Military Commander"],terms:[{"role": "Mansa", "org": "Mali Empire", "start": 1235, "end": 1255}],orgs:[{name:"Mali Empire",role:"Founder & Mansa (1235–1255)"}],bio:"The Lion King of Mali. Founded the Mali Empire by defeating the Sosso king Sumanguru at the Battle of Kirina (1235). The Epic of Sundiata is the Iliad of West Africa, still recited by griots today."},
  {id:422,name:"Askia the Great",birth:1443,death:1538,region:"Africa",fields:["Politics", "Religion"],schools:["Empire", "Islam", "Diplomacy"],subregions:["West Africa"],dynasty:"Songhai Empire",party:"",roles:["Head of State"],terms:[{"role": "Emperor", "org": "Songhai Empire", "start": 1493, "end": 1528}],orgs:[{name:"Songhai Empire",role:"Emperor (1493–1528)"}],bio:"Transformed the Songhai Empire into the largest in African history. Made Timbuktu the intellectual capital of the world with 25,000 university students. Deposed by his son after going blind."},
  {id:423,name:"Taharqa",birth:-710,death:-664,region:"Africa",fields:["Military", "Politics", "Religion"],schools:["Empire", "General", "Ancient Architecture"],subregions:["Nubia"],dynasty:"Nubian / Kushite Dynasty",party:"",roles:["Head of State", "Military Commander"],terms:[{"role": "Pharaoh", "org": "Egypt", "start": -690, "end": -664}],orgs:[{name:"Nubian Kush / Egypt",role:"Pharaoh (690–664 BC)"}],bio:"Nubian king who ruled all of Egypt as Pharaoh. The Bible mentions him resisting the Assyrian invasion. His pyramid at Nuri is still the tallest ancient monument in Sudan. Represents the apex of Nubian civilization."},
  {id:424,name:"Shaka Zulu",birth:1787,death:1828,region:"Africa",fields:["Military", "Politics"],schools:["General", "Nationalism", "Empire"],subregions:["Southern Africa"],dynasty:"Zulu Kingdom",party:"",roles:["Head of State", "Military Commander"],terms:[{"role": "King", "org": "Zulu Kingdom", "start": 1816, "end": 1828}],orgs:[{name:"Zulu Kingdom",role:"King (1816–1828)"}],bio:"Military genius who transformed the Zulu from a minor clan into a major empire. Invented the impondo zankomo (bull horn) battle formation. Built an army of 50,000. Assassinated by his half-brothers."},
  {id:425,name:"Yaa Asantewaa",birth:1840,death:1921,region:"Africa",fields:["Military", "Politics"],schools:["Nationalism", "Guerrilla"],subregions:["West Africa"],dynasty:"Ashanti Empire",party:"",roles:["Military Commander", "Head of State"],terms:[],orgs:[{name:"Ashanti Empire",role:"Queen Mother & War Leader"}],bio:"Led the War of the Golden Stool (1900) against the British — the last major Ashanti uprising. If your men will not fight, then we women will. Exiled to the Seychelles where she died. A symbol of African resistance to colonialism."},
  {id:426,name:"Haile Selassie",birth:1892,death:1975,region:"Africa",fields:["Politics", "Religion"],schools:["Empire", "Nationalism", "Diplomacy"],subregions:["East Africa"],dynasty:"Solomonic Dynasty",party:"",roles:["Head of State"],terms:[{"role": "Emperor", "org": "Ethiopia", "start": 1930, "end": 1974}],orgs:[{name:"Ethiopia",role:"Emperor (1930–1974)"}],bio:"Last Emperor of Ethiopia. Regent of the Lion of Judah. Led Ethiopia against Mussolini's invasion, addressed the League of Nations (ignored). Returned to power after WWII. Deposed in a Marxist coup. Worshipped as God by Rastafarians."},
  {id:427,name:"Nelson Mandela",birth:1918,death:2013,region:"Africa",fields:["Politics", "Philosophy"],schools:["Republic", "Nationalism", "Pacifism"],subregions:["Southern Africa"],dynasty:"",party:"",roles:["Head of State", "Revolutionary"],terms:[{"role": "President", "org": "South Africa", "start": 1994, "end": 1999}],orgs:[{name:"South Africa",role:"President (1994–1999)"},{name:"ANC",role:"Leader"}],bio:"Imprisoned 27 years on Robben Island. On release, chose reconciliation over revenge — preventing civil war. Led South Africa's transition from apartheid to democracy. Nobel Peace Prize 1993. The most admired political figure of the late 20th century."},
  {id:428,name:"Cleopatra VII",birth:-69,death:-30,region:"Egypt",fields:["Politics", "Philosophy", "Science"],schools:["Diplomacy", "Monarchy", "Medicine"],subregions:["Ptolemaic"],dynasty:"Ptolemaic Dynasty",party:"",roles:["Head of State"],terms:[{"role": "Pharaoh", "org": "Egypt", "start": -51, "end": -30}],orgs:[{name:"Egypt",role:"Pharaoh (51–30 BC)"}],bio:"Last active ruler of the Ptolemaic Kingdom. Fluent in 9 languages — the first Ptolemaic ruler to learn Egyptian. Allied with Caesar then Mark Antony. Her death ended the ancient Egyptian state. Shakespeare, Shaw and countless others found her irresistible."},
  {id:435,name:"Pacal the Great",birth:603,death:683,region:"USA",fields:["Politics", "Art", "Religion"],schools:["Maya", "Architecture", "Astronomy"],subregions:["Mesoamerica"],dynasty:"Palenque Dynasty",party:"",roles:["Head of State"],terms:[{"role": "Ajaw (King)", "org": "Palenque", "start": 615, "end": 683}],orgs:[{name:"Palenque",role:"King (615–683)"}],bio:"Greatest ruler of Palenque, the jewel of Maya civilization. His tomb in the Temple of the Inscriptions — discovered 1952 — redefined understanding of Maya culture. Built Palenque into the most artistically sophisticated city in the Americas."},
  {id:436,name:"Montezuma II",birth:1466,death:1520,region:"USA",fields:["Politics", "Religion", "Military"],schools:["Aztec", "Empire", "Theology"],subregions:["Mesoamerica"],dynasty:"Aztec Empire",party:"",roles:["Head of State"],terms:[{"role": "Huey Tlatoani", "org": "Aztec Empire", "start": 1502, "end": 1520}],orgs:[{name:"Aztec Empire",role:"Huey Tlatoani (1502–1520)"}],bio:"Ninth ruler of the Aztec Empire at its greatest extent — 5 million subjects. Met Hernán Cortés in 1519 and was held hostage. Died during the Spanish conquest under disputed circumstances — conquest or killed by his own people."},
  {id:437,name:"Cuauhtémoc",birth:1497,death:1525,region:"USA",fields:["Military", "Politics"],schools:["Aztec", "Nationalism", "General"],subregions:["Mesoamerica"],dynasty:"Aztec Empire",party:"",roles:["Head of State", "Military Commander"],terms:[{"role": "Huey Tlatoani", "org": "Aztec Empire", "start": 1520, "end": 1521}],orgs:[{name:"Aztec Empire",role:"Last Emperor (1520–1521)"}],bio:"Last ruler of the Aztec Empire. Led the final defence of Tenochtitlan against Cortés — the city fell after 80 days of siege. Tortured to reveal hidden gold (said nothing). Hanged by Cortés in 1525. National hero of Mexico."},
  {id:438,name:"Pachacuti",birth:1418,death:1471,region:"USA",fields:["Politics", "Military", "Art"],schools:["Inca", "Empire", "Architecture"],subregions:["South America"],dynasty:"Inca Empire",party:"",roles:["Head of State", "Military Commander"],terms:[{"role": "Sapa Inca", "org": "Inca Empire", "start": 1438, "end": 1471}],orgs:[{name:"Inca Empire",role:"Sapa Inca (1438–1471)"}],bio:"Built Machu Picchu. Transformed the Inca from a regional chiefdom into the largest empire in the Americas — 12 million people, 40,000 km of roads, no writing system. His name means Earth-Shaker."},
  {id:439,name:"Atahualpa",birth:1502,death:1533,region:"USA",fields:["Politics", "Military"],schools:["Inca", "Empire"],subregions:["South America"],dynasty:"Inca Empire",party:"",roles:["Head of State"],terms:[{"role": "Sapa Inca", "org": "Inca Empire", "start": 1532, "end": 1533}],orgs:[{name:"Inca Empire",role:"Sapa Inca (1532–1533)"}],bio:"Last sovereign emperor of the Inca. Captured by Pizarro at Cajamarca (1532) with 168 Spaniards against 80,000 Inca soldiers — one of history's most decisive ambushes. Offered a room full of gold for his ransom. Strangled anyway."},
  {id:440,name:"Toussaint Louverture",birth:1743,death:1803,region:"USA",fields:["Military", "Politics", "Philosophy"],schools:["Revolutionary", "Republic", "General", "Nationalism"],subregions:["Caribbean"],dynasty:"",party:"",roles:["Head of State", "Military Commander", "Revolutionary"],terms:[],orgs:[{name:"Saint-Domingue",role:"Governor-General"}],bio:"Led the only successful slave revolt in history. Born enslaved in Haiti, became the greatest Black general of his era. Defeated Napoleon's army, yellow fever and the British — securing Haitian independence. Captured by treachery and died in a French prison."},
  {id:441,name:"Simón Bolívar",birth:1783,death:1830,region:"USA",fields:["Military", "Politics", "Philosophy"],schools:["Revolutionary", "Republic", "General", "Nationalism", "Liberalism"],subregions:["South America"],dynasty:"",party:"",roles:["Head of State", "Military Commander", "Revolutionary"],terms:[{"role": "President", "org": "Gran Colombia", "start": 1819, "end": 1830}],orgs:[{name:"Gran Colombia",role:"President & Liberator"},{name:"South America",role:"Liberator of 6 Nations"}],bio:"El Libertador. Liberated Venezuela, Colombia, Ecuador, Peru, Bolivia (named after him) and Panama from Spanish rule. Crossed the Andes with an army — his own Hannibal moment. Died disillusioned, South America fragmenting into rival states."},
  {id:442,name:"José de San Martín",birth:1778,death:1850,region:"USA",fields:["Military", "Politics"],schools:["Revolutionary", "General", "Republic"],subregions:["South America"],dynasty:"",party:"",roles:["Head of State", "Military Commander", "Revolutionary"],terms:[],orgs:[{name:"Argentina / Chile / Peru",role:"Liberator"}],bio:"Liberated Argentina, Chile and Peru. Crossed the Andes in winter with 5,000 men. Met Bolívar in Guayaquil — what they discussed remains history's great mystery. Voluntarily stepped aside and died in exile in France."},
  {id:443,name:"Sitting Bull",birth:1831,death:1890,region:"USA",fields:["Military", "Religion", "Politics"],schools:["General", "Nationalism", "Spiritualism"],subregions:["USA"],dynasty:"",party:"",roles:["Military Commander", "Religious Leader"],terms:[],orgs:[{name:"Lakota Sioux Nation",role:"War Chief & Holy Man"}],bio:"United the Sioux nations and defeated Custer at the Battle of Little Bighorn (1876). Had visions before the battle predicting his victory. Performed with Buffalo Bill's Wild West Show. Shot by Indian police during the Ghost Dance uprising."},
  {id:444,name:"Tecumseh",birth:1768,death:1813,region:"USA",fields:["Military", "Politics", "Philosophy"],schools:["General", "Nationalism", "Diplomacy"],subregions:["USA"],dynasty:"",party:"",roles:["Military Commander"],terms:[],orgs:[{name:"Tecumseh's Confederacy",role:"War Chief"}],bio:"Attempted to build a pan-Native American confederacy to resist US expansion — the most sophisticated indigenous political project in North American history. Brilliant orator and tactician. Killed at the Battle of the Thames. His death ended native resistance east of the Mississippi."},
  {id:450,name:"Pope Leo I",birth:400,death:461,region:"Italy",fields:["Religion", "Politics", "Philosophy"],schools:["Catholicism", "Theology", "Diplomacy"],subregions:["Rome", "Papal States"],dynasty:"Papacy",party:"",roles:["Head of State", "Religious Leader"],terms:[{"role": "Pope", "org": "Holy See", "start": 440, "end": 461}],orgs:[{name:"Holy See",role:"Pope (440–461)"}],bio:"Leo the Great. Persuaded Attila the Hun to turn back from Rome (452) — the most dramatic personal diplomatic achievement in history. Defined papal primacy and the nature of Christ. First pope to be called Great."},
  {id:451,name:"Pope Gregory I",birth:540,death:604,region:"Italy",fields:["Religion", "Philosophy", "Art"],schools:["Catholicism", "Theology", "Music"],subregions:["Rome", "Papal States"],dynasty:"Papacy",party:"",roles:["Head of State", "Religious Leader"],terms:[{"role": "Pope", "org": "Holy See", "start": 590, "end": 604}],orgs:[{name:"Holy See",role:"Pope (590–604)"}],bio:"Gregory the Great. Sent missionaries to England (St. Augustine of Canterbury). Codified Gregorian chant. Defined the role of pope as universal shepherd. His pastoral writings shaped medieval Christianity."},
  {id:452,name:"Pope Urban II",birth:1042,death:1099,region:"Italy",fields:["Religion", "Military", "Politics"],schools:["Catholicism", "Crusade"],subregions:["Papal States"],dynasty:"Papacy",party:"",roles:["Head of State", "Religious Leader"],terms:[{"role": "Pope", "org": "Holy See", "start": 1088, "end": 1099}],orgs:[{name:"Holy See",role:"Pope (1088–1099)"}],bio:"Called the First Crusade at Clermont (1095) — one speech that launched two centuries of holy war and permanently shaped relations between Christianity and Islam. Died before hearing that Jerusalem had fallen."},
  {id:453,name:"Pope Innocent III",birth:1161,death:1216,region:"Italy",fields:["Religion", "Politics"],schools:["Catholicism", "Theology", "Canon Law"],subregions:["Papal States"],dynasty:"Papacy",party:"",roles:["Head of State", "Religious Leader"],terms:[{"role": "Pope", "org": "Holy See", "start": 1198, "end": 1216}],orgs:[{name:"Holy See",role:"Pope (1198–1216)"}],bio:"Peak of papal temporal power. Called the Fourth Crusade (which sacked Christian Constantinople). Approved the Franciscans and Dominicans. Forced King John to accept Magna Carta indirectly. The most powerful pope in history."},
  {id:454,name:"Pope Alexander VI",birth:1431,death:1503,region:"Italy",fields:["Religion", "Politics"],schools:["Catholicism", "Diplomacy", "Colonial"],subregions:["Papal States"],dynasty:"Papacy",party:"",roles:["Head of State", "Religious Leader"],terms:[{"role": "Pope", "org": "Holy See", "start": 1492, "end": 1503}],orgs:[{name:"Holy See",role:"Pope (1492–1503)"}],bio:"The Borgia pope. Divided the New World between Spain and Portugal (Treaty of Tordesillas, 1494). Father of Cesare and Lucrezia Borgia. Corrupt, nepotistic, and politically brilliant. The model for Machiavelli's Prince."},
  {id:455,name:"Pope Leo X",birth:1475,death:1521,region:"Italy",fields:["Religion", "Art", "Politics"],schools:["Catholicism", "Renaissance Art", "Humanism"],subregions:["Papal States"],dynasty:"Papacy",party:"",roles:["Head of State", "Religious Leader"],terms:[{"role": "Pope", "org": "Holy See", "start": 1513, "end": 1521}],orgs:[{name:"Holy See",role:"Pope (1513–1521)"}],bio:"Medici pope who said Since God has given us the papacy, let us enjoy it. Commissioned Raphael to decorate the Vatican. His sale of indulgences to fund St. Peter's prompted Martin Luther's 95 Theses. Excommunicated Luther in 1521."},
  {id:456,name:"Pope Pius IX",birth:1792,death:1878,region:"Italy",fields:["Religion", "Politics"],schools:["Catholicism", "Theology"],subregions:["Papal States"],dynasty:"Papacy",party:"",roles:["Head of State", "Religious Leader"],terms:[{"role": "Pope", "org": "Holy See", "start": 1846, "end": 1878}],orgs:[{name:"Holy See",role:"Pope (1846–1878)"}],bio:"Longest-serving pope (32 years). Proclaimed papal infallibility at Vatican I (1870). Lost the Papal States to unified Italy — the temporal power of the papacy ended. Declared the Immaculate Conception as dogma."},
  {id:457,name:"Pope John XXIII",birth:1881,death:1963,region:"Italy",fields:["Religion", "Philosophy", "Diplomacy"],schools:["Catholicism", "Theology", "Ecumenism"],subregions:["Vatican"],dynasty:"Papacy",party:"",roles:["Head of State", "Religious Leader"],terms:[{"role": "Pope", "org": "Holy See", "start": 1958, "end": 1963}],orgs:[{name:"Holy See",role:"Pope (1958–1963)"}],bio:"Good Pope John. Called the Second Vatican Council — the most significant event in modern Catholic history — opened the Church to modernity. Published Pacem in Terris during the Cuban Missile Crisis. Canonized 2014."},
  {id:458,name:"Pope John Paul II",birth:1920,death:2005,region:"Italy",fields:["Religion", "Philosophy", "Politics"],schools:["Catholicism", "Theology", "Phenomenology", "Nationalism"],subregions:["Vatican"],dynasty:"Papacy",party:"",roles:["Head of State", "Religious Leader"],terms:[{"role": "Pope", "org": "Holy See", "start": 1978, "end": 2005}],orgs:[{name:"Holy See",role:"Pope (1978–2005)"}],bio:"First non-Italian pope since 1523. His 1979 visit to Poland galvanized Solidarity and began the fall of communism. Survived an assassination attempt in 1981. The most travelled person in history. Canonized 2014."},
  {id:459,name:"Pope Francis",birth:1936,death:2026,region:"Italy",fields:["Religion", "Philosophy", "Politics"],schools:["Catholicism", "Theology", "Social Justice"],subregions:["Vatican"],dynasty:"Papacy",party:"",roles:["Head of State", "Religious Leader"],terms:[{"role": "Pope", "org": "Holy See", "start": 2013, "end": 2026}],orgs:[{name:"Holy See",role:"Pope (2013–present)"}],bio:"First Jesuit pope. First from the Americas. Chose the name Francis after Francis of Assisi. Focused on the poor, climate change and interfaith dialogue. Who am I to judge? — his response on homosexuality — made global headlines."},
  {id:470,name:"Winston Churchill",birth:1874,death:1965,region:"England",fields:["Politics", "Military", "Literature"],schools:["Nationalism", "Diplomacy", "Colonial", "Literature"],subregions:["Victorian"],dynasty:"",party:"",roles:["Head of State", "Military Commander", "Writer / Poet"],terms:[{"role": "Prime Minister", "org": "United Kingdom", "start": 1940, "end": 1945}, {"role": "Prime Minister", "org": "United Kingdom", "start": 1951, "end": 1955}],orgs:[{name:"United Kingdom",role:"Prime Minister (1940–45, 1951–55)"}],bio:"We shall fight on the beaches. Led Britain through its darkest hours in WWII. His speeches were arguably Britain's greatest weapon. Nobel Prize in Literature 1953. Voted greatest Briton of all time."},
  {id:471,name:"Clement Attlee",birth:1883,death:1967,region:"England",fields:["Politics"],schools:["Republic", "Federalism", "Socialism"],subregions:["Victorian"],dynasty:"",party:"",roles:["Head of State"],terms:[{"role": "Prime Minister", "org": "United Kingdom", "start": 1945, "end": 1951}],orgs:[{name:"United Kingdom",role:"Prime Minister (1945–1951)"}],bio:"Created the NHS, the welfare state and nationalised key industries. Defeated Churchill in a landslide in 1945. Presided over Indian independence. Arguably the most consequential British PM of the 20th century."},
  {id:472,name:"Margaret Thatcher",birth:1925,death:2013,region:"England",fields:["Politics", "Philosophy"],schools:["Nationalism", "Liberalism", "Republic"],subregions:["Victorian"],dynasty:"",party:"",roles:["Head of State"],terms:[{"role": "Prime Minister", "org": "United Kingdom", "start": 1979, "end": 1990}],orgs:[{name:"United Kingdom",role:"Prime Minister (1979–1990)"}],bio:"The Iron Lady. First female British Prime Minister. Transformed the British economy — privatisation, defeating the miners, Big Bang. Falklands War. Close partnership with Reagan in ending the Cold War."},
  {id:473,name:"Tony Blair",birth:1953,death:2026,region:"England",fields:["Politics"],schools:["Republic", "Diplomacy", "Federalism"],subregions:["Victorian"],dynasty:"",party:"",roles:["Head of State"],terms:[{"role": "Prime Minister", "org": "United Kingdom", "start": 1997, "end": 2007}],orgs:[{name:"United Kingdom",role:"Prime Minister (1997–2007)"}],bio:"Three election victories. Good Friday Agreement ended the Troubles in Northern Ireland. Iraq War (2003) destroyed his legacy. The third way — New Labour modernised the party but triangulated away its soul."},
  {id:474,name:"Konrad Adenauer",birth:1876,death:1967,region:"Germany",fields:["Politics", "Diplomacy"],schools:["Republic", "Federalism", "Diplomacy"],subregions:["Germany"],dynasty:"",party:"",roles:["Head of State"],terms:[{"role": "Chancellor", "org": "West Germany", "start": 1949, "end": 1963}],orgs:[{name:"West Germany",role:"Chancellor (1949–1963)"}],bio:"Father of the Federal Republic. Rebuilt West Germany from rubble into Europe's strongest economy. Anchored Germany in NATO and the European Community. Achieved sovereignty through reliability. Became Chancellor at 73."},
  {id:475,name:"Helmut Kohl",birth:1930,death:2017,region:"Germany",fields:["Politics", "Diplomacy"],schools:["Nationalism", "Diplomacy", "Federalism"],subregions:["Germany"],dynasty:"",party:"",roles:["Head of State"],terms:[{"role": "Chancellor", "org": "Germany", "start": 1982, "end": 1998}],orgs:[{name:"Germany",role:"Chancellor (1982–1998)"}],bio:"Chancellor of German Reunification (1990) — his greatest achievement. The last pan-European statesman alongside Mitterrand. Oversaw the introduction of the Euro. Longest-serving German post-war chancellor."},
  {id:476,name:"Angela Merkel",birth:1954,death:2026,region:"Germany",fields:["Politics", "Science"],schools:["Republic", "Federalism", "Pragmatism"],subregions:["Germany"],dynasty:"",party:"",roles:["Head of State"],terms:[{"role": "Chancellor", "org": "Germany", "start": 2005, "end": 2021}],orgs:[{name:"Germany",role:"Chancellor (2005–2021)"}],bio:"16 years as Germany's chancellor. Physicist turned politician. Managed the 2008 financial crisis, Eurozone crisis, Syrian refugee crisis and COVID. The most powerful woman in European history. Mutti — the nation's mother."},
  {id:477,name:"Charles de Gaulle",birth:1890,death:1970,region:"France",fields:["Military", "Politics", "Philosophy"],schools:["Nationalism", "Diplomacy", "General", "Republic"],subregions:["Revolutionary France"],dynasty:"",party:"",roles:["Head of State", "Military Commander"],terms:[{"role": "President", "org": "France", "start": 1959, "end": 1969}, {"role": "Free French Leader", "org": "Free France", "start": 1940, "end": 1944}],orgs:[{name:"France",role:"President (1959–1969)"},{name:"Free France",role:"Leader (1940–1944)"}],bio:"France is not France without grandeur. Refused to accept the fall of France in 1940 — his BBC broadcast made him the symbol of resistance. Founded the Fifth Republic tailored to his own vision. Resigned after losing a referendum. Defining figure of modern France."},
  {id:478,name:"François Mitterrand",birth:1916,death:1996,region:"France",fields:["Politics", "Literature"],schools:["Socialism", "Republic", "Diplomacy", "Literature"],subregions:["Revolutionary France"],dynasty:"",party:"",roles:["Head of State"],terms:[{"role": "President", "org": "France", "start": 1981, "end": 1995}],orgs:[{name:"France",role:"President (1981–1995)"}],bio:"Longest-serving French President (14 years). Socialist who nationalized industries then reversed course. Architect of European integration with Kohl. Ordered the Bibliothèque Nationale, the Louvre Pyramid, the Grande Arche. The last great literary politician."},
  {id:479,name:"Helmut Schmidt",birth:1918,death:2015,region:"Germany",fields:["Politics", "Military", "Philosophy"],schools:["Federalism", "Diplomacy", "Republic"],subregions:["Germany"],dynasty:"",party:"",roles:["Head of State", "Military Commander"],terms:[{"role": "Chancellor", "org": "West Germany", "start": 1974, "end": 1982}],orgs:[{name:"West Germany",role:"Chancellor (1974–1982)"}],bio:"Crisis manager par excellence. Navigated Germany through the oil crisis, RAF terrorism and NATO's double-track decision. Helped create the G7 and the European Monetary System. The most respected German statesman of his generation."},
  {id:480,name:"Willy Brandt",birth:1913,death:1992,region:"Germany",fields:["Politics", "Diplomacy"],schools:["Socialism", "Diplomacy", "Republic", "Pacifism"],subregions:["Germany"],dynasty:"",party:"",roles:["Head of State"],terms:[{"role": "Chancellor", "org": "West Germany", "start": 1969, "end": 1974}],orgs:[{name:"West Germany",role:"Chancellor (1969–1974)"}],bio:"Ostpolitik — normalized relations with Eastern Europe. His spontaneous genuflection at the Warsaw Ghetto memorial (1970) is among the most powerful political images of the 20th century. Nobel Peace Prize 1971. Forced to resign over a spy in his office."},
  {id:481,name:"Václav Havel",birth:1936,death:2011,region:"Austria",fields:["Politics", "Art", "Philosophy"],schools:["Republic", "Existentialism", "Drama", "Dissent"],subregions:["Central Europe"],dynasty:"",party:"",roles:["Head of State", "Writer / Poet", "Revolutionary"],terms:[{"role": "President", "org": "Czechoslovakia / Czech Republic", "start": 1989, "end": 2003}],orgs:[{name:"Czechoslovakia",role:"President (1989–1992)"},{name:"Czech Republic",role:"President (1993–2003)"}],bio:"Playwright turned dissident turned president. Led the Velvet Revolution. The power of the powerless — his essay on living in truth under totalitarianism. The only head of state to have written absurdist theatre performed on Broadway."},
  {id:482,name:"Lech Wałęsa",birth:1943,death:2026,region:"Austria",fields:["Politics", "Religion"],schools:["Republic", "Nationalism", "Catholicism", "Dissent"],subregions:["Central Europe"],dynasty:"",party:"",roles:["Head of State", "Revolutionary"],terms:[{"role": "President", "org": "Poland", "start": 1990, "end": 1995}],orgs:[{name:"Poland",role:"President (1990–1995)"},{name:"Solidarity",role:"Founder & Leader"}],bio:"Electrician who founded Solidarity — the first free trade union behind the Iron Curtain. His movement with Pope John Paul II cracked communism in Poland. Nobel Peace Prize 1983. Later served as President."},
  {id:483,name:"Josip Broz Tito",birth:1892,death:1980,region:"Austria",fields:["Military", "Politics"],schools:["Revolutionary", "Socialism", "Nationalism", "Diplomacy"],subregions:["Balkans"],dynasty:"",party:"",roles:["Head of State", "Military Commander", "Revolutionary"],terms:[{"role": "President", "org": "Yugoslavia", "start": 1953, "end": 1980}],orgs:[{name:"Yugoslavia",role:"President for Life (1953–1980)"},{name:"Non-Aligned Movement",role:"Founder"}],bio:"Led the Yugoslav Partisans to self-liberation — the only occupied country to liberate itself without Soviet help. Said No to Stalin and survived. Founded the Non-Aligned Movement. After his death, Yugoslavia fell apart."},
  {id:484,name:"Francisco Franco",birth:1892,death:1975,region:"Spain",fields:["Military", "Politics"],schools:["Nationalism", "Military Command", "Catholicism"],subregions:["Spain"],dynasty:"",party:"",roles:["Head of State", "Military Commander"],terms:[{"role": "Caudillo (Dictator)", "org": "Spain", "start": 1939, "end": 1975}],orgs:[{name:"Spain",role:"Caudillo (1939–1975)"}],bio:"Won the Spanish Civil War with German and Italian support. Maintained Spanish neutrality in WWII through shrewd diplomacy. 40-year dictatorship preserved his regime until his death. Spain transitioned peacefully to democracy immediately after."},
  {id:485,name:"Gerhard Schröder",birth:1944,death:2026,region:"Germany",fields:["Politics"],schools:["Socialism", "Republic", "Diplomacy"],subregions:["Germany"],dynasty:"",party:"",roles:["Head of State"],terms:[{"role": "Chancellor", "org": "Germany", "start": 1998, "end": 2005}],orgs:[{name:"Germany",role:"Chancellor (1998–2005)"}],bio:"Agenda 2010 — painful labour market reforms that modernized Germany's economy. Opposed the Iraq War alongside Chirac. Controversially became an executive at Gazprom after leaving office."},
  {id:486,name:"Nicolas Sarkozy",birth:1955,death:2026,region:"France",fields:["Politics", "Diplomacy"],schools:["Republic", "Nationalism", "Diplomacy"],subregions:["Revolutionary France"],dynasty:"",party:"",roles:["Head of State"],terms:[{"role": "President", "org": "France", "start": 2007, "end": 2012}],orgs:[{name:"France",role:"President (2007–2012)"}],bio:"Hyperactive bling president. Managed the 2008 financial crisis as EU president. Intervened in Libya. First French president convicted of corruption (2021)."},
  {id:487,name:"Emmanuel Macron",birth:1977,death:2026,region:"France",fields:["Politics", "Philosophy"],schools:["Republic", "Liberalism", "Diplomacy"],subregions:["Revolutionary France"],dynasty:"",party:"",roles:["Head of State"],terms:[{"role": "President", "org": "France", "start": 2017, "end": 2026}],orgs:[{name:"France",role:"President (2017–present)"}],bio:"Youngest French president. Former Rothschild banker. Founded his own political movement (En Marche!) and destroyed both traditional parties. Pro-European federalist. Navigated COVID, Ukrainian war and social unrest."},
  {id:488,name:"Silvio Berlusconi",birth:1936,death:2023,region:"Italy",fields:["Politics", "Art"],schools:["Nationalism", "Liberalism", "Media"],subregions:["Papal States"],dynasty:"",party:"",roles:["Head of State"],terms:[{"role": "Prime Minister", "org": "Italy", "start": 1994, "end": 1995}, {"role": "Prime Minister", "org": "Italy", "start": 2001, "end": 2006}, {"role": "Prime Minister", "org": "Italy", "start": 2008, "end": 2011}],orgs:[{name:"Italy",role:"Prime Minister (1994–95, 2001–06, 2008–11)"}],bio:"Media mogul who entered politics to avoid prosecution. Dominated Italian politics for 20 years. Three terms as PM. 30+ criminal proceedings. The template for the media-populist politician later seen globally."}

// ═══════════════════════════════════════════════════════
// FILTERING
// ═══════════════════════════════════════════════════════
function matchesBase(p) {
  if (S.nameSearch && !p.name.toLowerCase().includes(S.nameSearch.toLowerCase())) return false;
  if (S.yearFrom !== null && p.death < S.yearFrom) return false;
  if (S.yearTo   !== null && p.birth > S.yearTo)   return false;
  return true;
}

function personMatchesEpoch(p, epochName) {
  const ep = EPOCHS.find(e => e.name === epochName);
  if (!ep) return false;
  return p.birth <= ep.end && p.death >= ep.start;
}

function filtered() {
  return PERSONS.filter(p => {
    if (!matchesBase(p)) return false;
    if (S.selFields.size     > 0 && !p.fields.some(f      => S.selFields.has(f)))           return false;
    if (S.selSchools.size    > 0 && !p.schools.some(s     => S.selSchools.has(s)))          return false;
    if (S.selRegions.size    > 0 && !S.selRegions.has(p.region))                            return false;
    if (S.selSubregions.size > 0 && !(p.subregions||[]).some(s => S.selSubregions.has(s)))  return false;
    if (S.selEpochs.size     > 0 && !([...S.selEpochs].some(e => personMatchesEpoch(p,e)))) return false;
    if (S.selDynasties.size  > 0 && !S.selDynasties.has(p.dynasty||""))                          return false;
    if (S.selContinents.size > 0 && !S.selContinents.has(continentOf(p.region).name))              return false;
    if (S.selRoles.size      > 0 && !(p.roles||[]).some(r => S.selRoles.has(r)))                   return false;
    // toolbar role filter — filter by specific term roles (president, VP etc)
    if (S.toolbarRoles.size  > 0) {
      const personTermRoles = (p.terms||[]).map(t=>t.role);
      // also parse from orgs
      if (personTermRoles.length === 0) (p.orgs||[]).forEach(o => personTermRoles.push(o.role.replace(/\s*\(.*\)$/,'').trim()));
      if (!personTermRoles.some(r => S.toolbarRoles.has(r))) return false;
    }
    return true;
  });
}

// Count helpers — each counts with all filters EXCEPT its own dimension
// so you always see what would be added if you clicked that node
function countWith(extraField, extraSchool, extraRegion, extraSub, extraEpoch, extraDynasty, extraContinent, extraRole) {
  return PERSONS.filter(p => {
    if (!matchesBase(p)) return false;
    const fields  = extraField  ? new Set([...S.selFields,  extraField])  : S.selFields;
    const schools = extraSchool ? new Set([...S.selSchools, extraSchool]) : S.selSchools;
    const regions = extraRegion ? new Set([...S.selRegions, extraRegion]) : S.selRegions;
    const subs    = extraSub    ? new Set([...S.selSubregions, extraSub]) : S.selSubregions;
    const epochs  = extraEpoch  ? new Set([...S.selEpochs,  extraEpoch]) : S.selEpochs;
    if (fields.size  > 0 && !p.fields.some(f    => fields.has(f)))         return false;
    if (schools.size > 0 && !p.schools.some(s   => schools.has(s)))        return false;
    if (regions.size > 0 && !regions.has(p.region))                        return false;
    if (subs.size    > 0 && !(p.subregions||[]).some(s => subs.has(s)))    return false;
    if (epochs.size  > 0 && !([...epochs].some(e => personMatchesEpoch(p,e)))) return false;
    const dynasts = extraDynasty ? new Set([...S.selDynasties, extraDynasty]) : S.selDynasties;
    if (dynasts.size > 0 && !dynasts.has(p.dynasty||""))                           return false;
    const conts = extraContinent ? new Set([...S.selContinents, extraContinent]) : S.selContinents;
    if (conts.size > 0 && !conts.has(continentOf(p.region).name))                  return false;
    const rols = extraRole ? new Set([...S.selRoles, extraRole]) : S.selRoles;
    if (rols.size > 0 && !(p.roles||[]).some(r => rols.has(r)))                    return false;
    return true;
  }).length;
}

function fy(y) { return y < 0 ? `${Math.abs(y)} BC` : y >= CURRENT_YEAR ? 'present' : `${y} AD`; }
function pct(y, mn, mx) { return ((y - mn) / (mx - mn)) * 100; }
