function buildTree() {
  const c = document.getElementById('tree-root');
  c.innerHTML = '';
  buildFieldSection(c);
  buildRegionSection(c);
  buildEpochSection(c);
  buildDynastySection(c);
  buildRoleSection(c);
  buildEpochRowSelector(c);
}

function treeSection(container, nodeKey, label, totalActive) {
  const open = S.openNodes.has(nodeKey);
  const wrap = document.createElement('div');
  wrap.className = 'ts-section';

  const head = document.createElement('div');
  head.className = 'ts-head';
  head.innerHTML = `
    <span class="ts-toggle">${open ? '▼' : '▶'}</span>
    <span class="ts-label">${label}</span>
    ${totalActive > 0 ? `<span class="ts-active-badge">${totalActive}</span>` : ''}
  `;
  head.onclick = () => {
    S.openNodes.has(nodeKey) ? S.openNodes.delete(nodeKey) : S.openNodes.add(nodeKey);
    buildTree();
  };
  wrap.appendChild(head);

  const body = document.createElement('div');
  body.className = 'ts-body' + (open ? ' open' : '');
  wrap.appendChild(body);
  container.appendChild(wrap);
  return body;
}

function treeNode(container, {key, label, color, count, selected, indent, hasChildren, isOpen, onToggle, onSelect}) {
  const row = document.createElement('div');
  row.className = 'tn-row' + (selected ? ' tn-sel' : '') + (count === 0 ? ' tn-zero' : '');
  row.style.paddingLeft = (10 + indent * 16) + 'px';

  const toggle = document.createElement('span');
  toggle.className = 'tn-toggle';
  if (hasChildren) {
    toggle.textContent = isOpen ? '−' : '+';
    toggle.onclick = e => { e.stopPropagation(); onToggle(); };
  } else {
    toggle.textContent = '·';
    toggle.style.color = 'var(--border)';
  }

  const dot = document.createElement('span');
  dot.className = 'tn-dot';
  dot.style.background = selected ? color : 'transparent';
  dot.style.borderColor = color;

  const lbl = document.createElement('span');
  lbl.className = 'tn-lbl';
  lbl.textContent = label;

  const cnt = document.createElement('span');
  cnt.className = 'tn-count' + (count === 0 ? ' tn-count-zero' : '');
  cnt.textContent = count;

  row.appendChild(toggle);
  row.appendChild(dot);
  row.appendChild(lbl);
  row.appendChild(cnt);
  row.onclick = () => onSelect();
  container.appendChild(row);
  return row;
}

// ── FIELD section ──
function buildFieldSection(c) {
  const totalActive = S.selFields.size + S.selSchools.size;
  const body = treeSection(c, 'FIELD', 'Field', totalActive);
  if (!S.openNodes.has('FIELD')) return;

  Object.entries(TX).forEach(([fn, {color, subs}]) => {
    const fieldOpen = S.openNodes.has('F:'+fn);
    const fieldSel  = S.selFields.has(fn);
    const cnt = countWith(fieldSel ? null : fn, null, null, null, null);

    treeNode(body, {
      key: fn, label: fn, color, count: cnt,
      selected: fieldSel, indent: 0,
      hasChildren: subs.length > 0, isOpen: fieldOpen,
      onToggle: () => { S.openNodes.has('F:'+fn) ? S.openNodes.delete('F:'+fn) : S.openNodes.add('F:'+fn); buildTree(); },
      onSelect: () => { fieldSel ? S.selFields.delete(fn) : S.selFields.add(fn); refresh(); },
    });

    if (fieldOpen) {
      subs.forEach(sub => {
        const subSel = S.selSchools.has(sub);
        const scnt = countWith(null, subSel ? null : sub, null, null, null);
        treeNode(body, {
          key: sub, label: sub, color, count: scnt,
          selected: subSel, indent: 1,
          hasChildren: false, isOpen: false,
          onToggle: () => {},
          onSelect: () => { subSel ? S.selSchools.delete(sub) : S.selSchools.add(sub); refresh(); },
        });
      });
    }
  });
}

// ── REGION section ──
function buildRegionSection(c) {
  const totalActive = S.selContinents.size + S.selRegions.size + S.selSubregions.size;
  const body = treeSection(c, 'REGION', 'Region', totalActive);
  if (!S.openNodes.has('REGION')) return;

  // Group visible regions by continent
  const usedRegions = ALL_REGIONS.filter(r => true); // show all, counts will show 0 if none
  const grouped = {};
  usedRegions.forEach(r => {
    const ct = continentOf(r);
    if (!grouped[ct.name]) grouped[ct.name] = {color: ct.color, regions: []};
    grouped[ct.name].regions.push(r);
  });
  // Add continents that exist in CONTINENTS order
  CONTINENTS.forEach(ct => {
    const g = grouped[ct.name];
    if (!g) return; // no regions from this continent in data yet
    const contOpen = S.openNodes.has('CT:'+ct.name);
    const contSel  = S.selContinents.has(ct.name);
    const contCnt  = countWith(null,null,null,null,null,null, contSel ? null : ct.name);

    // Level 1: Continent
    treeNode(body, {
      label: ct.name, color: ct.color, count: contCnt,
      selected: contSel, indent: 0,
      hasChildren: true, isOpen: contOpen,
      onToggle: () => { S.openNodes.has('CT:'+ct.name) ? S.openNodes.delete('CT:'+ct.name) : S.openNodes.add('CT:'+ct.name); buildTree(); },
      onSelect: () => { contSel ? S.selContinents.delete(ct.name) : S.selContinents.add(ct.name); refresh(); },
    });

    if (contOpen) {
      g.regions.forEach(r => {
        const {color=ct.color, subs=[]} = TR[r] || {};
        const regOpen = S.openNodes.has('R:'+r);
        const regSel  = S.selRegions.has(r);
        const cnt = countWith(null, null, regSel ? null : r, null, null);

        // Level 2: Country/Region
        treeNode(body, {
          label: r, color, count: cnt,
          selected: regSel, indent: 1,
          hasChildren: subs.length > 0, isOpen: regOpen,
          onToggle: () => { S.openNodes.has('R:'+r) ? S.openNodes.delete('R:'+r) : S.openNodes.add('R:'+r); buildTree(); },
          onSelect: () => { regSel ? S.selRegions.delete(r) : S.selRegions.add(r); refresh(); },
        });

        if (regOpen) {
          subs.forEach(sub => {
            const subSel = S.selSubregions.has(sub);
            const scnt = countWith(null, null, null, subSel ? null : sub, null);

            // Level 3: Sub-region / period
            treeNode(body, {
              label: sub, color, count: scnt,
              selected: subSel, indent: 2,
              hasChildren: false, isOpen: false,
              onToggle: () => {},
              onSelect: () => { subSel ? S.selSubregions.delete(sub) : S.selSubregions.add(sub); refresh(); },
            });
          });
        }
      });
    }
  });
}

// ── EPOCH section ──
function buildEpochSection(c) {
  const totalActive = S.selEpochs.size;
  const body = treeSection(c, 'EPOCH', 'Epoch', totalActive);
  if (!S.openNodes.has('EPOCH')) return;

  EPOCHS.forEach(ep => {
    const epSel = S.selEpochs.has(ep.name);
    const cnt = countWith(null, null, null, null, epSel ? null : ep.name);
    treeNode(body, {
      key: ep.name, label: ep.name, color: ep.color, count: cnt,
      selected: epSel, indent: 0,
      hasChildren: false, isOpen: false,
      onToggle: () => {},
      onSelect: () => { epSel ? S.selEpochs.delete(ep.name) : S.selEpochs.add(ep.name); refresh(); },
    });
  });
}

// ═══════════════════════════════════════════════════════
// ACTIVE FILTER BAR
// ═══════════════════════════════════════════════════════
function renderFilterBar() {
  const bar = document.getElementById('af-bar');
  const tags = [];
  S.selFields.forEach(f     => tags.push({label: f,         rm: () => { S.selFields.delete(f);      refresh(); }}));
  S.selSchools.forEach(s    => tags.push({label: `· ${s}`,  rm: () => { S.selSchools.delete(s);     refresh(); }}));
  S.selRoles.forEach(r      => tags.push({label: `◈ ${r}`,  rm: () => { S.selRoles.delete(r);      refresh(); }}));
  S.selContinents.forEach(ct => tags.push({label: ct,       rm: () => { S.selContinents.delete(ct); refresh(); }}));
  S.selRegions.forEach(r    => tags.push({label: r,         rm: () => { S.selRegions.delete(r);     refresh(); }}));
  S.selSubregions.forEach(s => tags.push({label: `· ${s}`,  rm: () => { S.selSubregions.delete(s); refresh(); }}));
  S.selEpochs.forEach(e     => tags.push({label: e,         rm: () => { S.selEpochs.delete(e);      refresh(); }}));
  S.selDynasties.forEach(d  => tags.push({label: `⚜ ${d}`,    rm: () => { S.selDynasties.delete(d); refresh(); }}));
  if (S.yearFrom !== null) tags.push({label: `from ${fy(S.yearFrom)}`, rm: () => { S.yearFrom = null; document.getElementById('year-from').value=''; refresh(); }});
  if (S.yearTo   !== null) tags.push({label: `to ${fy(S.yearTo)}`,    rm: () => { S.yearTo   = null; document.getElementById('year-to').value='';   refresh(); }});

  if (!tags.length) { bar.classList.remove('vis'); bar.innerHTML=''; return; }
  bar.classList.add('vis');
  bar.innerHTML = '<span class="af-lbl">Active:</span>';
  tags.forEach(t => {
    const d = document.createElement('div'); d.className = 'af-tag';
    d.innerHTML = `${t.label} <span class="af-x">×</span>`;
    d.querySelector('.af-x').onclick = t.rm;
    bar.appendChild(d);
  });
}

// ═══════════════════════════════════════════════════════
// TIMELINE RENDER
// ═══════════════════════════════════════════════════════
function render() {
  if (S.activeTab !== "timeline") return;
  const persons = filtered();
  const mn = persons.length ? Math.min(...persons.map(p=>p.birth)) - 30 : -600;
  const mx = persons.length ? Math.max(...persons.map(p=>p.death)) + 30 : 2000;

  document.getElementById('stat-persons').textContent = PERSONS.length;
  document.getElementById('stat-visible').textContent = persons.length;
  document.getElementById('stat-span').textContent = persons.length
    ? `${fy(Math.min(...persons.map(p=>p.birth)))} – ${fy(Math.min(Math.max(...persons.map(p=>p.death)), CURRENT_YEAR))}`
    : '—';

  renderFilterBar();

  const area = document.getElementById('timeline-area');
  area.innerHTML = '';

  // zoom-wrap: single div that stretches horizontally; area scrolls it
  const zoomWrap = document.createElement('div');
  const zoomW = Math.max(1, S.zoom);
  zoomWrap.style.cssText = `width:${zoomW * 100}%;min-width:${zoomW * 100}%;position:relative;`;
  area.appendChild(zoomWrap);

  // Axis row first — appended to zoomWrap before inner
  const ar = document.createElement('div'); ar.className = 'axis-row';
  ar.style.cssText = 'position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);margin-bottom:0;padding-bottom:8px;padding-top:8px;width:100%;box-sizing:border-box;display:flex;align-items:flex-end;';
  zoomWrap.appendChild(ar);

  // inner: rows go here — appended after axis
  const inner = document.createElement('div');
  inner.style.cssText = 'width:100%;position:relative;';
  zoomWrap.appendChild(inner);

  const leftSpacer = document.createElement('div'); leftSpacer.className = 'axis-left-spacer';
  ar.appendChild(leftSpacer);
  const rightSpacer = document.createElement('div'); rightSpacer.className = 'axis-right-spacer';
  const ai = document.createElement('div'); ai.className = 'axis-inner';
  const span = mx - mn, step = span>2000?500:span>800?200:span>300?100:50;
  for (let y = Math.ceil(mn/step)*step; y <= mx; y += step) {
    const t = document.createElement('div'); t.className = 'axis-tick';
    t.style.left = pct(y,mn,mx)+'%'; t.textContent = fy(y); ai.appendChild(t);
  }
  ai.appendChild(Object.assign(document.createElement('div'),{className:'axis-line'}));
  ar.appendChild(ai);
  ar.appendChild(rightSpacer); // ar already appended to zoomWrap above

  // ── Multi-civ epoch legend rows ──────────────────────────────────
  // Only show rows relevant to visible persons
  // Epoch rows are purely manual — only show what user selected
  const visibleEpochRows = EPOCH_ROWS.filter(row => S.selEpochRows.has(row.civ));
  const relevantRows = visibleEpochRows;

  function makeEpochLegendRow(row, mn, mx, stickyTop) {
    const legendRow = document.createElement('div');
    legendRow.style.cssText = `display:flex;align-items:stretch;width:100%;box-sizing:border-box;height:24px;border-bottom:1px solid var(--border)44;position:sticky;top:${stickyTop}px;z-index:9;background:var(--bg);`;
    // Left label
    const legendLeft = document.createElement('div');
    legendLeft.style.cssText = `width:200px;flex-shrink:0;position:sticky;left:0;z-index:2;background:var(--bg);display:flex;align-items:center;padding-left:20px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;color:${row.color};text-transform:uppercase;opacity:.8;`;
    legendLeft.textContent = row.label;
    legendRow.appendChild(legendLeft);
    // Bar area
    const legendBars = document.createElement('div');
    legendBars.style.cssText = 'flex:1;position:relative;overflow:hidden;';
    row.epochs.forEach(ep => {
      const l = pct(ep.start,mn,mx), w = pct(ep.end,mn,mx)-l;
      if (w <= 0 || l > 100 || l+w < 0) return;
      const cl = Math.max(0,l), cw = Math.min(100,l+w)-cl;
      const seg = document.createElement('div');
      seg.style.cssText = `position:absolute;left:${cl}%;width:${cw}%;top:0;bottom:0;background:${ep.color};opacity:.28;display:flex;align-items:center;justify-content:center;overflow:hidden;box-sizing:border-box;border-right:1px solid ${ep.color}88;`;
      seg.title = ep.name;
    seg.style.cursor = 'help';
      const lbl = document.createElement('span');
      const estPx = cw * 8;
      const txt = estPx > 100 ? ep.name : estPx > 45 ? ep.name.split(' ')[0] : estPx > 22 ? ep.name.substring(0,3).toUpperCase() : '';
      lbl.style.cssText = `font-family:'JetBrains Mono',monospace;font-size:9px;color:#fff;opacity:.95;white-space:nowrap;letter-spacing:.06em;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.9);overflow:hidden;text-overflow:ellipsis;max-width:94%;`;
      lbl.textContent = txt.toUpperCase();
      seg.appendChild(lbl);
      legendBars.appendChild(seg);
    });
    legendRow.appendChild(legendBars);
    // Right spacer
    const legendRight = document.createElement('div');
    legendRight.style.cssText = 'width:80px;flex-shrink:0;position:sticky;right:0;z-index:2;background:var(--bg);';
    legendRow.appendChild(legendRight);
    return legendRow;
  }

  // Render all relevant epoch rows
  const AXIS_HEIGHT = 40;
  relevantRows.forEach((row, i) => inner.appendChild(makeEpochLegendRow(row, mn, mx, AXIS_HEIGHT + i * 24)));

  // Epoch boundary dotted lines — only from selected/visible epoch rows
  const lineOverlay = document.createElement('div');
  lineOverlay.style.cssText = 'position:absolute;top:0;left:200px;right:80px;bottom:0;pointer-events:none;z-index:1;overflow:hidden;';
  const boundaryYears = new Set();
  visibleEpochRows.forEach(row => row.epochs.forEach((ep,i) => { if(i>0) boundaryYears.add(ep.start); }));
  boundaryYears.forEach(year => {
    const xPct = pct(year,mn,mx);
    if (xPct < 0 || xPct > 100) return;
    const line = document.createElement('div');
    line.style.cssText = `position:absolute;left:${xPct}%;top:0;bottom:0;width:1px;border-left:1px dashed rgba(255,255,255,.1);`;
    lineOverlay.appendChild(line);
  });
  inner.style.position = 'relative';
  inner.appendChild(lineOverlay);


  // Groups
  let groups = {};
  if (S.groupBy==='field')  persons.forEach(p => { const g=p.fields[0]||'Other'; (groups[g]||(groups[g]=[])).push(p); });
  else if (S.groupBy==='region') persons.forEach(p => { (groups[p.region]||(groups[p.region]=[])).push(p); });
  else if (S.groupBy==='epoch') persons.forEach(p => {
    const ep = EPOCHS.find(e => p.birth>=e.start && p.birth<=e.end) || {name:'Other'};
    (groups[ep.name]||(groups[ep.name]=[])).push(p);
  });
  else if (S.groupBy==='dynasty') persons.forEach(p => { const g=p.dynasty||'Other'; (groups[g]||(groups[g]=[])).push(p); });
  else groups['All'] = persons;

  Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([gn,gp]) => {
    const col = TX[gn]?.color || TR[gn]?.color || TD[gn]?.color;
    const gh = document.createElement('div'); gh.className='group-header'; gh.style.cssText='position:sticky;left:0;right:0;z-index:3;width:100%;box-sizing:border-box;';
    gh.innerHTML = col
      ? `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${col};margin-right:7px;vertical-align:middle"></span>${gn.toUpperCase()}`
      : gn.toUpperCase();
    inner.appendChild(gh);

    // Sort by office start (first term) or birth
    function firstOfficeStart(p) {
      // if toolbar roles selected, sort by first matching term
      const terms = p.terms || [];
      if (S.toolbarRoles.size > 0 && terms.length > 0) {
        const matching = terms.filter(t => S.toolbarRoles.has(t.role));
        if (matching.length > 0) return matching[0].start;
      }
      if (terms.length > 0) return terms[0].start;
      for (const o of (p.orgs||[])) {
        const m = o.role.match(/\((\d{1,4})/);
        if (m) return parseInt(m[1]);
      }
      return p.birth;
    }
    gp.sort((a,b) => S.sortMode === 'office'
      ? firstOfficeStart(a) - firstOfficeStart(b)
      : a.birth - b.birth
    ).forEach(p => {
      const row = document.createElement('div');
      row.className = 'person-row' + (S.selected===p.id?' selected':'');
      row.onclick = () => selectPerson(p);
      const nc = document.createElement('div'); nc.className='person-name-col';
      nc.innerHTML = `<div class="person-name">${p.name}</div><div class="person-dates">${fy(p.birth)} – ${fy(p.death)}</div>`;
      nc.addEventListener('mouseenter', () => { clearTimeout(popTimer); showPopover(p, nc); });
      nc.addEventListener('mouseleave', () => { popTimer = setTimeout(hidePopover, 300); });
      row.appendChild(nc);
      const ba = document.createElement('div'); ba.className='bar-area';
      EPOCHS.forEach(ep => {
        const b = document.createElement('div'); b.className='epoch-band';
        b.style.left = pct(ep.start,mn,mx)+'%';
        b.style.width = (pct(ep.end,mn,mx)-pct(ep.start,mn,mx))+'%';
        b.style.background = ep.color;
        ba.appendChild(b);
      });
      const bar = document.createElement('div'); bar.className='person-bar';
      bar.style.background = TX[p.fields[0]]?.color || '#7a7a8e';
      bar.style.left = pct(p.birth,mn,mx)+'%';
      const deathCapped = Math.min(p.death, CURRENT_YEAR);
      const isLiving = p.death > CURRENT_YEAR;
      bar.style.width = Math.max(0.5, pct(deathCapped,mn,mx)-pct(p.birth,mn,mx))+'%';
      if (isLiving) bar.style.borderRight = '2px dashed rgba(255,255,255,.4)';
      ba.appendChild(bar);

      // Collect terms — explicit or parsed from orgs
      const terms = p.terms ? [...p.terms] : [];
      if (terms.length === 0 && p.orgs) {
        p.orgs.forEach(o => {
          const rx = /\((\d{1,4})\s*[\u2013\-]\s*(\d{1,4}|present)\)/g;
          let m;
          while ((m = rx.exec(o.role)) !== null) {
            terms.push({role: o.role.replace(/\s*\(.*\)$/,'').trim(), org: o.name, start: parseInt(m[1]), end: m[2]==='present'?CURRENT_YEAR:parseInt(m[2])});
          }
        });
      }

      if (S.viewMode === 'lifetime' || terms.length === 0) {
        // Lifetime mode: term bars overlaid on lifespan bar
        terms.forEach(term => {
          const ts = term.start, te = Math.min(term.end||CURRENT_YEAR, CURRENT_YEAR);
          if (ts >= te || ts > mx || te < mn) return;
          const tb = document.createElement('div');
          tb.style.cssText = `position:absolute;top:50%;transform:translateY(-50%);height:8px;border-radius:2px;background:#e8e4d9;opacity:.92;left:${pct(ts,mn,mx)}%;width:${Math.max(0.4,pct(Math.min(te,mx),mn,mx)-pct(Math.max(ts,mn),mn,mx))}%;pointer-events:all;cursor:help;z-index:2;`;
          tb.addEventListener('mouseenter', ev => showTermTooltip(p, term, ev));
          tb.addEventListener('mousemove',  ev => moveTermTooltip(ev));
          tb.addEventListener('mouseleave', () => hideTermTooltip());
          ba.appendChild(tb);
        });
        row.appendChild(ba);
      } else {
        // Office mode: one sub-row per term
        row.appendChild(ba);
        inner.appendChild(row);
        terms.forEach((term, ti) => {
          const ts = term.start, te = Math.min(term.end||CURRENT_YEAR, CURRENT_YEAR);
          const subRow = document.createElement('div');
          subRow.style.cssText = 'display:flex;align-items:center;min-height:20px;';
          const subNc = document.createElement('div');
          subNc.style.cssText = 'width:200px;flex-shrink:0;padding:0 12px 0 28px;';
          subNc.innerHTML = `<span style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--dim)">↳ ${term.role}</span>`;
          const subBa = document.createElement('div');
          subBa.style.cssText = 'flex:1;position:relative;height:20px;';
          // ghost lifespan
          const ghost = document.createElement('div');
          const fc2 = TX[p.fields[0]]?.color||'#7a7a8e';
          ghost.style.cssText = `position:absolute;top:50%;transform:translateY(-50%);height:3px;border-radius:1px;background:${fc2};opacity:.15;left:${pct(p.birth,mn,mx)}%;width:${Math.max(0.3,pct(Math.min(p.death,CURRENT_YEAR),mn,mx)-pct(p.birth,mn,mx))}%`;
          subBa.appendChild(ghost);
          if (ts < mx && te > mn) {
            const tb = document.createElement('div');
            tb.style.cssText = `position:absolute;top:50%;transform:translateY(-50%);height:10px;border-radius:2px;background:#e8e4d9;opacity:.9;left:${pct(Math.max(ts,mn),mn,mx)}%;width:${Math.max(0.4,pct(Math.min(te,mx),mn,mx)-pct(Math.max(ts,mn),mn,mx))}%;cursor:help;z-index:2;`;
            tb.addEventListener('mouseenter', ev => showTermTooltip(p, term, ev));
            tb.addEventListener('mousemove',  ev => moveTermTooltip(ev));
            tb.addEventListener('mouseleave', () => hideTermTooltip());
            subBa.appendChild(tb);
          }
          subRow.appendChild(subNc); subRow.appendChild(subBa);
          // also add region tag to sub-row
          const subRtag = document.createElement('div');
          subRtag.style.cssText = 'width:80px;flex-shrink:0;';
          subRow.appendChild(subRtag);
          inner.appendChild(subRow);
        });
        return; // skip normal row append below
      }
      // Region tag on the right
      const rtag = document.createElement('div');
      rtag.className = 'region-tag';
      const rcol = TR[p.region]?.color || '#7a7a8e';
      rtag.style.borderColor = rcol;
      rtag.style.color = rcol;
      rtag.textContent = p.region;
      row.appendChild(rtag);
      inner.appendChild(row);
    });
  });

  if (!persons.length) {
    const e = document.createElement('div');
    e.style.cssText='text-align:center;padding:60px;color:var(--muted);font-style:italic;font-size:16px;';
    e.textContent='No persons match the current filters.';
    inner.appendChild(e);
  }
}

// ═══════════════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════════════
function selectPerson(p) {
  S.selected = p.id; render();
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('d-name').textContent = p.name;
  document.getElementById('d-dates').textContent = `${fy(p.birth)} – ${fy(p.death)}${p.death >= CURRENT_YEAR ? ' (living)' : ''}`;
  document.getElementById('d-fields').innerHTML  = p.fields.map(f=>`<div class="detail-chip" style="border-color:${TX[f]?.color||'#444'};color:${TX[f]?.color||'#aaa'}">${f}</div>`).join('');
  document.getElementById('d-schools').innerHTML = p.schools.map(s=>`<div class="detail-chip" style="font-size:11px;opacity:.8">${s}</div>`).join('');
  document.getElementById('d-regions').innerHTML = `<div class="detail-chip">${p.region}</div>${p.party?`<div class="detail-chip" style="border-color:${PARTY_COLORS[p.party]||'#444'};color:${PARTY_COLORS[p.party]||'#aaa'}">${p.party}</div>`:''}${p.dynasty ? `<div class="detail-chip" style="border-color:${TD[p.dynasty]?.color||'#444'};color:${TD[p.dynasty]?.color||'#aaa'}">${p.dynasty}</div>` : ''}`;
  document.getElementById('d-orgs').innerHTML = p.orgs.map(o=>`<div class="detail-rel">${o.name}<span>${o.role}</span></div>`).join('');
  const contemps = PERSONS.filter(q=>q.id!==p.id&&q.birth<=p.death&&q.death>=p.birth)
    .sort((a,b)=>Math.abs(a.birth-p.birth)-Math.abs(b.birth-p.birth)).slice(0,6);
  document.getElementById('d-contemps').innerHTML = contemps.map(q=>
    `<div class="detail-rel" style="cursor:pointer" onclick="selectPerson(PERSONS.find(x=>x.id===${q.id}))">${q.name}<span>${fy(q.birth)}–${fy(q.death)}</span></div>`).join('');
  document.getElementById('d-bio').textContent = p.bio;
  document.getElementById('d-wiki').innerHTML = `<a href="${wikiURL(p.name)}"

const pop = document.getElementById('popover');
let popTimer = null;
pop.addEventListener('mouseenter', () => { clearTimeout(popTimer); });
pop.addEventListener('mouseleave', () => { popTimer = setTimeout(hidePopover, 200); });

function showPopover(p, anchorEl) {
  // Build content
  const contemps = PERSONS
    .filter(q => q.id !== p.id && q.birth <= p.death && q.death >= p.birth)
    .sort((a,b) => Math.abs(a.birth-p.birth) - Math.abs(b.birth-p.birth))
    .slice(0, 4);

  pop.innerHTML = `
    <div class="pop-name">${p.name}</div>
    <div class="pop-dates">${fy(p.birth)} – ${fy(p.death)}</div>
    <div class="pop-section">
      <h4>Fields</h4>
      <div class="pop-chips">
        ${p.fields.map(f=>`<div class="pop-chip" style="border-color:${TX[f]?.color||'#444'};color:${TX[f]?.color||'#aaa'}">${f}</div>`).join('')}
      </div>
      <div class="pop-chips">
        ${p.schools.map(s=>`<div class="pop-chip" style="font-size:10px">${s}</div>`).join('')}
      </div>
    </div>
    <div class="pop-section">
      <h4>Region</h4>
      <div class="pop-chips"><div class="pop-chip">${p.region}</div></div>
    </div>
    <div class="pop-section">
      <h4>Roles</h4>
      ${p.orgs.map(o=>`<div class="pop-rel">${o.name}<span>${o.role}</span></div>`).join('')}
    </div>
    ${contemps.length ? `
    <div class="pop-section">
      <h4>Contemporaries</h4>
      ${contemps.map(q=>`<div class="pop-rel">${q.name}<span>${fy(q.birth)}–${fy(q.death)}</span></div>`).join('')}
    </div>` : ''}
    <div class="pop-bio">${p.bio}</div>
    <div style="margin-top:8px;border-top:1px solid var(--border);padding-top:7px">
      <a href="${wikiURL(p.name)}"
         target="_blank" rel="noopener"
         style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:4px;opacity:.85;pointer-events:all"
         onmouseenter="this.style.opacity=1" onmouseleave="this.style.opacity=.85">
        &#x2197; Wikipedia
      </a>
    </div>
  `;
  pop.style.pointerEvents = 'auto';

  // Position: prefer left of cursor, flip right if too close to left edge
  const rect = anchorEl.getBoundingClientRect();
  const vw = window.innerWidth, vh = window.innerHeight;
  const pw = 280, ph = 400; // approx popover size

  let left = rect.left - pw - 10;
  if (left < 8) left = rect.right + 10; // flip to right if no room left
  let top = rect.top - 10;
  if (top + ph > vh - 8) top = vh - ph - 8; // keep on screen vertically
  if (top < 8) top = 8;

  pop.style.left = left + 'px';
  pop.style.top  = top  + 'px';
  pop.classList.add('show');
}

function hidePopover() {
  pop.classList.remove('show');
}

// ZOOM
// ═══════════════════════════════════════════════════════
function zoomToSliderPos(z) {
  // log scale: slider 0..1 maps to zoom ZOOM_MIN..ZOOM_MAX
  return (Math.log(z) - Math.log(ZOOM_MIN)) / (Math.log(ZOOM_MAX) - Math.log(ZOOM_MIN));
}
function sliderPosToZoom(t) {
  return ZOOM_MIN * Math.pow(ZOOM_MAX / ZOOM_MIN, t);
}
function updateZoomUI() {
  const t = zoomToSliderPos(S.zoom);
  const thumb = document.getElementById('zoom-thumb');
  const label = document.getElementById('zoom-label');
  if (thumb) thumb.style.left = (t * 100) + '%';
  if (label) label.textContent = S.zoom < 1.05 ? '' : S.zoom.toFixed(1) + '×';
}
function setZoom(z) {
  S.zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, z));
  updateZoomUI();
  render();
}

function initZoomControls() {
  document.getElementById('zoom-in').onclick  = () => setZoom(S.zoom * 1.5);
  document.getElementById('zoom-out').onclick = () => setZoom(S.zoom / 1.5);
  document.getElementById('zoom-fit').onclick = () => setZoom(1.0);

  // slider drag
  const track = document.getElementById('zoom-track');
  let dragging = false;
  function trackClick(e) {
    const rect = track.getBoundingClientRect();
    const t = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    setZoom(sliderPosToZoom(t));
  }
  track.addEventListener('mousedown', e => { dragging=true; trackClick(e); });
  document.addEventListener('mousemove', e => { if(dragging) trackClick(e); });
  document.addEventListener('mouseup', () => { dragging=false; });

  // scroll wheel on timeline
  document.getElementById('timeline-area').addEventListener('wheel', e => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
      setZoom(S.zoom * factor);
    }
  }, {passive:false});
}


// ── DYNASTY section ──
function buildDynastySection(c) {
  const totalActive = S.selDynasties.size;
  const body = treeSection(c, 'DYNASTY', 'Dynasty', totalActive);
  if (!S.openNodes.has('DYNASTY')) return;

  // Group by country — only show countries that have dynasties in data
  const countryMap = {};
  // Sort dynasties chronologically within each country group
  const sortedDynasties = [...ALL_DYNASTIES].sort((a,b) => (TD[a]?.start??9999)-(TD[b]?.start??9999));
  sortedDynasties.forEach(dy => {
    const country = dynastyCountry(dy);
    if (!countryMap[country]) countryMap[country] = [];
    countryMap[country].push(dy);
  });

  // Render in defined order, then any remaining
  const orderedCountries = DYNASTY_COUNTRY_ORDER.filter(ct => countryMap[ct]);
  const extraCountries = Object.keys(countryMap).filter(ct => !DYNASTY_COUNTRY_ORDER.includes(ct));

  [...orderedCountries, ...extraCountries].forEach(country => {
    const dynasties = countryMap[country];
    const ctColor = TD[dynasties[0]]?.color || '#7a7a8e';
    const ctOpen = S.openNodes.has('DC:'+country);

    // count for whole country group
    const ctCnt = dynasties.reduce((sum, dy) => {
      const sel = S.selDynasties.has(dy);
      return sum + (sel ? 0 : countWith(null,null,null,null,null,sel?null:dy));
    }, 0);
    const ctAnySel = dynasties.some(dy => S.selDynasties.has(dy));

    // Level 1: Country
    treeNode(body, {
      label: country, color: ctColor, count: ctCnt,
      selected: ctAnySel, indent: 0,
      hasChildren: true, isOpen: ctOpen,
      onToggle: () => {
        S.openNodes.has('DC:'+country) ? S.openNodes.delete('DC:'+country) : S.openNodes.add('DC:'+country);
        buildTree();
      },
      onSelect: () => {
        // selecting country = select all its dynasties
        const allSel = dynasties.every(dy => S.selDynasties.has(dy));
        dynasties.forEach(dy => allSel ? S.selDynasties.delete(dy) : S.selDynasties.add(dy));
        refresh();
      },
    });

    if (ctOpen) {
      dynasties.forEach(dy => {
        const {color='#7a7a8e'} = TD[dy] || {};
        const sel = S.selDynasties.has(dy);
        const cnt = countWith(null, null, null, null, null, sel ? null : dy);
        // Level 2: Dynasty
        treeNode(body, {
          label: dy, color, count: cnt, selected: sel, indent: 1,
          hasChildren: false, isOpen: false,
          onToggle: () => {},
          onSelect: () => { sel ? S.selDynasties.delete(dy) : S.selDynasties.add(dy); refresh(); },
        });
      });
    }
  });
}

function moveTermTooltip(e) {
  const tt = ensureTermTT();

  tt.style.left = x + 'px'; tt.style.top = y + 'px';
}
function hideTermTooltip() {

}

function getVisibleTermRoles() {
  // Only use explicit terms[] — never parse orgs[] which contains display strings
  const persons = filtered();
  const roles = new Set();
  persons.forEach(p => {
    (p.terms||[]).forEach(t => roles.add(t.role));
  });
  return [...roles].sort();

  const dd = document.getElementById('role-dropdown');
  const roles = getVisibleTermRoles();

    dd.innerHTML = '<div style="padding:8px 14px;font-family:JetBrains Mono,monospace;font-size:11px;color:var(--dim)">No roles in current view</div>';

  clearItem.style.marginBottom = '4px';

  {a:18,b:397,type:"influenced",label:"influenced"},// Kant → Hegel
  {a:397,b:19,type:"influenced",label:"influenced"},// Hegel → Marx
  {a:398,b:20,type:"influenced",label:"influenced"},// Kierkegaard → Nietzsche
  {a:399,b:20,type:"influenced",label:"influenced"},// Schopenhauer → Nietzsche
  {a:397,b:398,type:"opposed",label:"opposed"},     // Hegel vs Kierkegaard
  // Science
  {a:21,b:15,type:"influenced",label:"influenced"}, // Galileo → Newton
  // Chinese philosophy
  {a:4,b:402,type:"influenced",label:"influenced"}, // Confucius → Mencius
  {a:400,b:401,type:"influenced",label:"influenced"},// Laozi → Zhuangzi
  {a:4,b:23,type:"contemporary",label:"contemporary"},// Confucius & Socrates (rough)
  // Military
  {a:301,b:302,type:"opposed",label:"opposed"},     // Hannibal vs Scipio
  {a:302,b:301,type:"opposed",label:"opposed"},
  {a:1,b:23,type:"contemporary",label:"contemporary"},// Socrates & Confucius
  // Renaissance art
  {a:17,b:355,type:"contemporary",label:"contemporary"},// Homer influence chain placeholder
];

let netNodes = [], netEdges = [], netDragging = null, netSelected = null;
let netZoom = 1, netPanX = 0, netPanY = 0, netIsPanning = false;
let netPanStartX = 0, netPanStartY = 0, netAnimFrame = null;
let netHovered = null;

function renderNetwork() {
  const area = document.getElementById('network-area');
  area.innerHTML = '';

  const persons = filtered();
  if (persons.length === 0) { area.innerHTML = '<div style="padding:40px;color:var(--dim);font-family:monospace;font-size:12px">No persons match current filters</div>'; return; }
  if (persons.length > 150) { area.innerHTML = '<div style="padding:40px;color:var(--dim);font-family:monospace;font-size:12px">Too many persons for network view ('+persons.length+'). Apply filters to narrow down to <150.</div>'; return; }

  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'width:100%;height:100%;display:block;cursor:grab;';
  area.appendChild(canvas);

  // Legend
  const legend = document.createElement('div');
  legend.style.cssText = 'position:absolute;bottom:12px;left:12px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:8px 12px;font-family:JetBrains Mono,monospace;font-size:10px;color:var(--muted);pointer-events:none;';
  legend.innerHTML = Object.entries(EDGE_COLORS).map(([t,col])=>`<div style="display:flex;align-items:center;gap:6px;margin:2px 0"><div style="width:20px;height:2px;background:${col}"></div>${t}</div>`).join('');
  area.appendChild(legend);

  const W = area.clientWidth || 800;
  const H = area.clientHeight || 600;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const pSet = new Set(persons.map(p=>p.id));
  netNodes = persons.map((p,i) => ({
    ...p,
    x: W/2 + Math.cos(i/persons.length*Math.PI*2) * Math.min(W,H)*0.35,
    y: H/2 + Math.sin(i/persons.length*Math.PI*2) * Math.min(W,H)*0.3,
    vx:0, vy:0, r:8, pinned:false
  }));
  netEdges = RELATIONS.filter(r => pSet.has(r.a) && pSet.has(r.b)).map(r => ({
    ...r,
    source: netNodes.find(n=>n.id===r.a),
    target: netNodes.find(n=>n.id===r.b),
  })).filter(e => e.source && e.target);

  // Compute radii by degree
  const deg = {};
  netNodes.forEach(n => deg[n.id] = 6);
  netEdges.forEach(e => { deg[e.source.id]=(deg[e.source.id]||6)+2; deg[e.target.id]=(deg[e.target.id]||6)+2; });
  netNodes.forEach(n => n.r = Math.max(6, Math.min(18, deg[n.id])));

  netZoom=1; netPanX=0; netPanY=0; netSelected=null; netHovered=null;

  function simulate() {
    netNodes.forEach(n => {
      if (n.pinned || n===netDragging) return;
      netNodes.forEach(m => {
        if (m===n) return;
        const dx=n.x-m.x, dy=n.y-m.y, d=Math.sqrt(dx*dx+dy*dy)||1;
        const f=1600/(d*d);
        n.vx+=dx/d*f; n.vy+=dy/d*f;
      });
      n.vx+=(W/2-n.x)*0.002; n.vy+=(H/2-n.y)*0.002;
    });
    netEdges.forEach(e => {
      const dx=e.target.x-e.source.x, dy=e.target.y-e.source.y, d=Math.sqrt(dx*dx+dy*dy)||1;
      const target=e.type==='contemporary'?160:70;
      const f=(d-target)*0.025;
      if (!e.source.pinned&&e.source!==netDragging){e.source.vx+=dx/d*f;e.source.vy+=dy/d*f;}
      if (!e.target.pinned&&e.target!==netDragging){e.target.vx-=dx/d*f;e.target.vy-=dy/d*f;}
    });
    netNodes.forEach(n => {
      if (n.pinned||n===netDragging) return;
      n.vx*=0.75; n.vy*=0.75;
      n.x+=n.vx; n.y+=n.vy;
      n.x=Math.max(n.r+8,Math.min(W-n.r-8,n.x));
      n.y=Math.max(n.r+8,Math.min(H-n.r-8,n.y));
    });
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    ctx.save(); ctx.translate(netPanX,netPanY); ctx.scale(netZoom,netZoom);
    const selConn = netSelected ? new Set(netEdges.filter(e=>e.source.id===netSelected.id||e.target.id===netSelected.id).flatMap(e=>[e.source.id,e.target.id])) : null;

    // edges
    netEdges.forEach(e => {
      const isConn = !selConn || (selConn.has(e.source.id)&&selConn.has(e.target.id));
      ctx.globalAlpha = isConn ? EDGE_ALPHA[e.type] : 0.04;
      ctx.strokeStyle = EDGE_COLORS[e.type]; ctx.lineWidth = e.type==='taught'?2:1;
      ctx.setLineDash(e.type==='contemporary'?[3,4]:[]);
      ctx.beginPath(); ctx.moveTo(e.source.x,e.source.y);
      const mx=(e.source.x+e.target.x)/2+(e.target.y-e.source.y)*0.15;
      const my=(e.source.y+e.target.y)/2-(e.target.x-e.source.x)*0.15;
      ctx.quadraticCurveTo(mx,my,e.target.x,e.target.y); ctx.stroke();
      ctx.setLineDash([]);
      if (e.type!=='contemporary') {
        const dx=e.target.x-mx, dy=e.target.y-my, d=Math.sqrt(dx*dx+dy*dy)||1;
        const ax=e.target.x-dx/d*(e.target.r+4), ay=e.target.y-dy/d*(e.target.r+4);
        ctx.beginPath(); ctx.moveTo(ax,ay);
        ctx.lineTo(ax-dy/d*4-dx/d*6, ay+dx/d*4-dy/d*6);
        ctx.lineTo(ax+dy/d*4-dx/d*6, ay-dx/d*4-dy/d*6);
        ctx.closePath(); ctx.fillStyle=EDGE_COLORS[e.type]; ctx.fill();
      }
      ctx.globalAlpha=1;
    });

    // nodes
    netNodes.forEach(n => {
      const isDim = selConn && !selConn.has(n.id);
      const isSel = netSelected&&netSelected.id===n.id;
      const isHov = netHovered&&netHovered.id===n.id;
      ctx.globalAlpha = isDim?0.15:1;
      const col = TX[n.fields[0]]?.color||'#7a7a8e';
      if (isSel) { ctx.beginPath(); ctx.arc(n.x,n.y,n.r+4,0,Math.PI*2); ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke(); }
      ctx.beginPath(); ctx.arc(n.x,n.y,isHov?n.r+2:n.r,0,Math.PI*2);
      ctx.fillStyle=col+(isDim?'33':'cc'); ctx.fill();
      ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.stroke();
      ctx.globalAlpha=isDim?0.15:1;
      ctx.fillStyle='#e8e4d9';
      ctx.font=`${isSel||isHov?'bold ':''} ${Math.max(9,n.r*0.7)}px Georgia`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      // Show full name, abbreviate middle names if too long
      const nameParts = n.name.split(' ');
      const label = n.name.length > 18
        ? nameParts[0] + ' ' + nameParts[nameParts.length-1]
        : n.name;
      ctx.fillText(label, n.x, n.y+n.r+10);
      ctx.globalAlpha=1;
    });
    ctx.restore();
  }

  function cXY(e) {
    const r=canvas.getBoundingClientRect();
    return [(e.clientX-r.left-netPanX)/netZoom,(e.clientY-r.top-netPanY)/netZoom];
  }
  function nodeAt(x,y) { return netNodes.find(n=>Math.hypot(n.x-x,n.y-y)<n.r+4)||null; }

  canvas.addEventListener('mousedown',e=>{
    const [x,y]=cXY(e); const n=nodeAt(x,y);
    if(n){netDragging=n;}
    else{netIsPanning=true;netPanStartX=e.clientX-netPanX;netPanStartY=e.clientY-netPanY;}
  });
  canvas.addEventListener('mousemove',e=>{
    const [x,y]=cXY(e);
    if(netDragging){netDragging.x=x;netDragging.y=y;return;}
    if(netIsPanning){netPanX=e.clientX-netPanStartX;netPanY=e.clientY-netPanStartY;return;}
    netHovered=nodeAt(x,y);
    canvas.style.cursor=netHovered?'pointer':'grab';
  });
  canvas.addEventListener('mouseup',e=>{
    if(netDragging){
      const [x,y]=cXY(e);
      if(Math.hypot(netDragging.x-x,netDragging.y-y)<5){
        netSelected=netSelected&&netSelected.id===netDragging.id?null:netDragging;
      }
      netDragging=null;
    }
    netIsPanning=false;
  });
  canvas.addEventListener('dblclick',e=>{const[x,y]=cXY(e);const n=nodeAt(x,y);if(n)n.pinned=!n.pinned;});
  canvas.addEventListener('wheel',e=>{
    e.preventDefault();
    const f=e.deltaY<0?1.1:0.9;
    const r=canvas.getBoundingClientRect();
    const cx=e.clientX-r.left,cy=e.clientY-r.top;
    netPanX=cx-(cx-netPanX)*f;netPanY=cy-(cy-netPanY)*f;
    netZoom=Math.max(0.3,Math.min(4,netZoom*f));
  },{passive:false});

  if(netAnimFrame) cancelAnimationFrame(netAnimFrame);
  function loop(){simulate();draw();netAnimFrame=requestAnimationFrame(loop);}
  loop();
}

// ── TABLE VIEW ───────────────────────────────────────────────────
let tableSortCol = 'birth', tableSortDir = 1;

function renderTable() {
  const area = document.getElementById('table-area');
  const persons = filtered();
  area.innerHTML = '';

  // Toolbar
  const toolbar = document.createElement('div');
  toolbar.style.cssText = 'display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;';
  const countLbl = document.createElement('span');
  countLbl.style.cssText = 'font-family:JetBrains Mono,monospace;font-size:11px;color:var(--dim);';
  countLbl.textContent = `${persons.length} persons`;
  toolbar.appendChild(countLbl);

  // Export CSV
  const csvBtn = document.createElement('button');
  csvBtn.className = 'zoom-btn';
  csvBtn.style.cssText = 'font-size:10px;padding:3px 10px;margin-left:auto;';
  csvBtn.textContent = 'Export CSV';
  csvBtn.onclick = () => exportCSV(persons);
  toolbar.appendChild(csvBtn);

  // Export XLS (as TSV that Excel opens)
  const xlsBtn = document.createElement('button');
  xlsBtn.className = 'zoom-btn';
  xlsBtn.style.cssText = 'font-size:10px;padding:3px 10px;';
  xlsBtn.textContent = 'Export XLS';
  xlsBtn.onclick = () => exportXLS(persons);
  toolbar.appendChild(xlsBtn);
  area.appendChild(toolbar);

  // Table
  const tbl = document.createElement('table');
  tbl.style.cssText = 'width:100%;border-collapse:collapse;font-size:12px;font-family:JetBrains Mono,monospace;';

  const cols = [
    {key:'name',   label:'Name'},
    {key:'birth',  label:'Born'},
    {key:'death',  label:'Died'},
    {key:'fields', label:'Field'},
    {key:'region', label:'Region'},
    {key:'dynasty',label:'Dynasty'},
    {key:'party',  label:'Party'},
    {key:'roles',  label:'Role'},
  ];

  // Header
  const thead = document.createElement('thead');
  const hr = document.createElement('tr');
  cols.forEach(col => {
    const th = document.createElement('th');
    th.style.cssText = `padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);color:var(--dim);cursor:pointer;white-space:nowrap;user-select:none;position:sticky;top:0;background:var(--bg);`;
    const isSort = tableSortCol === col.key;
    th.innerHTML = `${col.label} ${isSort ? (tableSortDir===1?'↑':'↓') : ''}`;
    th.onclick = () => {
      if (tableSortCol===col.key) tableSortDir*=-1;
      else { tableSortCol=col.key; tableSortDir=1; }
      renderTable();
    };
    hr.appendChild(th);
  });
  thead.appendChild(hr);
  tbl.appendChild(thead);

  // Sort
  const sorted = [...persons].sort((a,b) => {
    let av = a[tableSortCol], bv = b[tableSortCol];
    if (Array.isArray(av)) av = av[0]||'';
    if (Array.isArray(bv)) bv = bv[0]||'';
    if (typeof av==='number'&&typeof bv==='number') return (av-bv)*tableSortDir;
    return String(av||'').localeCompare(String(bv||''))*tableSortDir;
  });

  // Body
  const tbody = document.createElement('tbody');
  sorted.forEach((p,i) => {
    const tr = document.createElement('tr');
    tr.style.cssText = `background:${i%2===0?'transparent':'rgba(255,255,255,.02)'};cursor:pointer;`;
    tr.onmouseenter = ()=>tr.style.background='rgba(201,169,110,.08)';
    tr.onmouseleave = ()=>tr.style.background=i%2===0?'transparent':'rgba(255,255,255,.02)';
    tr.onclick = () => { switchTab('timeline'); setTimeout(()=>{ S.nameSearch=p.name; document.getElementById('name-search').value=p.name; refresh(); },100); };

    const fieldCol = TX[p.fields[0]]?.color||'#7a7a8e';
    const cells = [
      `<span style="color:${fieldCol};font-family:Georgia,serif">${p.name}</span>`,
      `<span style="color:var(--muted)">${p.birth<0?Math.abs(p.birth)+' BC':p.birth}</span>`,
      `<span style="color:var(--muted)">${p.death>=CURRENT_YEAR?'present':p.death<0?Math.abs(p.death)+' BC':p.death}</span>`,
      `<span style="color:${fieldCol}">${p.fields[0]||''}</span>`,
      p.region||'',
      p.dynasty||'',
      p.party ? `<span style="color:${PARTY_COLORS[p.party]||'#7a7a8e'}">${p.party}</span>` : '',
      (p.roles||[]).join(', '),
    ];
    cells.forEach(html => {
      const td = document.createElement('td');
      td.style.cssText = 'padding:5px 10px;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;';
      td.innerHTML = html;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  area.appendChild(tbl);
}

function exportCSV(persons) {
  const cols = ['Name','Born','Died','Fields','Region','Dynasty','Party','Roles','Bio'];
  const rows = persons.map(p => [
    p.name,
    p.birth<0?-p.birth+' BC':p.birth,
    p.death>=CURRENT_YEAR?'present':p.death<0?-p.death+' BC':p.death,
    (p.fields||[]).join('; '),
    p.region||'',
    p.dynasty||'',
    p.party||'',
    (p.roles||[]).join('; '),
    (p.bio||'').replace(/"/g,"''"),
  ]);
  const csv = [cols,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  download('tessera-temporum.csv', 'text/csv', csv);
}

function exportXLS(persons) {
  const cols = ['Name','Born','Died','Fields','Region','Dynasty','Party','Roles'];
  const rows = persons.map(p => [
    p.name,
    p.birth<0?-p.birth+' BC':p.birth,
    p.death>=CURRENT_YEAR?'present':p.death<0?-p.death+' BC':p.death,
    (p.fields||[]).join('; '),
    p.region||'',
    p.dynasty||'',
    p.party||'',
    (p.roles||[]).join('; '),
  ]);
  const tsv = [cols,...rows].map(r=>r.join('\t')).join('\n');
  download('tessera-temporum.xls', 'application/vnd.ms-excel', tsv);
}

function download(filename, mime, content) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type:mime}));
  a.download = filename;
  a.click();
}


function refresh() { buildTree(); if(S.activeTab==="timeline") render(); else if(S.activeTab==="network") renderNetwork(); else if(S.activeTab==="table") renderTable(); }

document.getElementById('search-name').addEventListener('input', e => { S.nameSearch=e.target.value; render(); });
document.getElementById('year-from').addEventListener('input',  e => { S.yearFrom=e.target.value?parseInt(e.target.value):null; render(); });
document.getElementById('year-to').addEventListener('input',    e => { S.yearTo=e.target.value?parseInt(e.target.value):null; render(); });
document.getElementById('group-by').addEventListener('change',  e => { S.groupBy=e.target.value; render(); });

document.getElementById('btn-reset').addEventListener('click', () => {
  S.nameSearch=''; S.yearFrom=null; S.yearTo=null;
  S.selFields.clear(); S.selSchools.clear(); S.selContinents.clear(); S.selRegions.clear(); S.selSubregions.clear(); S.selEpochs.clear(); S.selDynasties.clear(); S.selRoles.clear(); S.toolbarRoles.clear(); S.roleDropOpen=false; S.selEpochRows.clear();
  S.selected=null;
  document.getElementById('search-name').value='';
  document.getElementById('year-from').value='';
  document.getElementById('year-to').value='';
  document.getElementById('detail-panel').classList.remove('open');
  refresh();
});
document.getElementById('close-detail').addEventListener('click', () => {
  S.selected=null; document.getElementById('detail-panel').classList.remove('open'); render();
});

window.PERSONS=PERSONS; window.selectPerson=selectPerson;
refresh();
initZoomControls();
updateZoomUI();
